        :root {
            --chic-red: #ff0a33;
            --base-red: #ff3b5c; /* Substitui o branco/rosa claro. Vermelho vivo. */
            --dark-bg: #050002;
            --bpm-ms: 521.73ms; 
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg); color: var(--base-red);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* --- UI Controls --- */
        #controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 0, 2, 0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.6s ease;
            backdrop-filter: blur(15px);
        }
        
        .control-box {
            padding: 50px; text-align: center;
            border: 1px solid rgba(255, 10, 51, 0.2);
            background: radial-gradient(circle at center, rgba(30, 0, 5, 0.8) 0%, transparent 100%);
            box-shadow: 0 0 80px rgba(255, 10, 51, 0.15);
            border-radius: 5px;
        }

        .control-box h1 { font-family: 'Syne', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin: 0 0 5px 0; color: var(--base-red); letter-spacing: 4px; text-shadow: 0 0 20px var(--chic-red); }
        .control-box p { color: #888; letter-spacing: 3px; font-size: 12px; margin-bottom: 30px; }
        
        .btn-play { margin-top: 30px; background: transparent; color: var(--chic-red); border: 1px solid var(--chic-red); padding: 15px 50px; font-family: 'Syne'; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: all 0.4s ease; letter-spacing: 4px; }
        .btn-play:hover { background: var(--chic-red); color: #000; box-shadow: 0 0 30px var(--chic-red); transform: scale(1.05); }
        
        .file-input-wrapper { display: flex; flex-direction: column; align-items: center; margin: 15px 0; }
        .custom-file-upload { display: inline-block; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-size: 11px; letter-spacing: 2px; color: #aaa; transition: 0.3s; text-transform: uppercase; }
        .custom-file-upload:hover { color: var(--base-red); border-color: var(--chic-red); }
        input[type="file"] { display: none; }

        .obs-toggle-wrapper { margin-top: 25px; display: flex; align-items: center; gap: 10px; color: var(--base-red); font-size: 11px; letter-spacing: 2px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .obs-toggle-wrapper:hover { opacity: 1; color: var(--chic-red); }

        /* --- STAGE LAYERS --- */
        #stage { position: relative; width: 100%; height: 100%; background: #000; }

        #image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; opacity: 0;
            filter: grayscale(0.7) contrast(1.3) brightness(0.3);
            transition: opacity 0.8s ease-in-out; transform: scale(1.05);
        }
        .bg-image.active { opacity: 1; animation: chic-breathe 15s linear infinite alternate; }
        @keyframes chic-breathe { 0% { transform: scale(1.05) translate(0, 0); } 100% { transform: scale(1.15) translate(-1%, 1%); } }

        .ambient-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: radial-gradient(circle at center, transparent 20%, #030001 95%);
            pointer-events: none;
        }

        /* THREE.JS 3D CANVAS */
        #canvas-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; opacity: 0.9; mix-blend-mode: screen; }

        /* Typography Container */
        #lyrics-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;
            display: flex; padding: 5%; box-sizing: border-box; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        /* Foreground Lights/Flares */
        #fg-lights { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; pointer-events: none; overflow: hidden; }

        /* OBS Cinematic Frame */
        #cinematic-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 7;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #cinematic-frame.active { opacity: 1; }
        .cinema-bar { width: 100%; height: 12%; background: #000; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .cam-cross { position: absolute; width: 20px; height: 20px; }
        .cam-cross::before, .cam-cross::after { content: ''; position: absolute; background: rgba(255,255,255,0.5); }
        .cam-cross::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .cam-cross::after { left: 50%; top: 0; height: 100%; width: 1px; }
        .cross-tl { top: 15%; left: 5%; } .cross-tr { top: 15%; right: 5%; }
        .cross-bl { bottom: 15%; left: 5%; } .cross-br { bottom: 15%; right: 5%; }
        .rec-dot { position: absolute; top: 15%; right: 50%; transform: translateX(50%); color: var(--chic-red); font-family: monospace; font-size: 14px; letter-spacing: 4px; animation: rec-blink 1s infinite; }
        @keyframes rec-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Strobe Effect */
        #strobe-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 8;
            background-color: var(--chic-red); opacity: 0; pointer-events: none; mix-blend-mode: overlay;
        }
        #strobe-layer.active { animation: chic-strobe 0.2s ease-out; }
        @keyframes chic-strobe { 0% { opacity: 0.5; } 100% { opacity: 0; } }

        /* --- KINETIC TYPOGRAPHY (HARD CUT, NO FADE) --- */
        .lyric-line {
            font-family: 'Syne', sans-serif; font-size: 8vw; font-weight: 800; 
            text-transform: uppercase; line-height: 0.95; 
            width: 100%; text-align: center;
            will-change: transform;
        }

        .k-word {
            display: inline-block;
            white-space: nowrap; /* IMPEDE A PALAVRA DE QUEBRAR (Ex: HO-PE) */
            margin-right: 2vw; /* Espaçamento entre palavras */
        }

        .k-letter {
            display: inline-block;
            opacity: 0;
            color: var(--base-red); 
            text-shadow: 0 0 15px rgba(255,10,51,0.8), 0 0 35px rgba(255,10,51,0.5);
            /* As animações serão aplicadas por JS */
        }

        /* ENTRADA SECA (Sem Fade In Suave, Sem Blur) */
        @keyframes hard-pop {
            0% { transform: scale(1.5) translateY(30px); opacity: 0; }
            1% { opacity: 1; } /* Opacidade instantânea */
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes subtle-float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-4px) rotate(1deg); text-shadow: 0 0 25px rgba(255,10,51,0.9), 0 0 50px rgba(255,10,51,0.6); }
        }

        /* Destaques Especiais */
        .highlight-solid {
            color: #000 !important;
            background: var(--chic-red);
            text-shadow: none !important;
            box-shadow: 0 0 30px var(--chic-red);
            border-radius: 4px;
        }
        .highlight-outline {
            color: transparent !important; 
            -webkit-text-stroke: 2px var(--base-red);
            filter: drop-shadow(0 0 20px rgba(255,10,51,0.8));
            text-shadow: none !important;
        }

        /* --- FOREGROUND ELEMENTS --- */
        .fg-orb {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,10,51,0.5) 0%, transparent 70%);
            pointer-events: none; mix-blend-mode: screen;
        }
        @keyframes fg-pass {
            0% { transform: translate(-100px, -100px) scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(100vw, 100vh) scale(4); opacity: 0; }
        }

    let subtitles = [];
    let images = [
        "https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?w=1600&q=80",

        "https://images.unsplash.com/photo-1558317751-bc3ed6f85f72?w=1600&q=80"
    ];
    let audioSrc = null;
    let isPlaying = false;
    let currentSrtIndex = -1;
    let currentImageIndex = 0;
    let startTime = 0;
    
    const outlineKeywords = ['glory hole', 'divine', 'body', 'throat'];
    const solidKeywords = ['scream', 'dark', 'hungry', 'lick', 'choke', 'bite', 'alive', 'yeah', 'hope'];
    const hyperTriggers = ['glory hole', 'Hey!', 'scream', 'choke', 'hole'];
    
    let hyperMode = false;
    let hyperInterval = null;

    // --- SETUP THREE.JS (NEW EYE DESIGN) ---
    let scene, camera, renderer, main3DObject, particles;
    let targetScale = 1; 
    
    function initThreeJS() {
        const container = document.getElementById('canvas-3d');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Group to hold the Eye parts
        main3DObject = new THREE.Group();

        // 1. Globo do Olho / Pálpebra externa (Esfera achatada no Y)
        const eyeGeo = new THREE.SphereGeometry(14, 32, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0a33, wireframe: true, transparent: true, opacity: 0.12 });
        const eyeMesh = new THREE.Mesh(eyeGeo, eyeMat);
        eyeMesh.scale.set(1, 0.35, 0.6); 
        
        // 2. Íris (Anel mecânico interno)
        const irisGeo = new THREE.TorusGeometry(4.5, 0.2, 16, 64);
        const irisMat = new THREE.MeshBasicMaterial({ color: 0xff0a33, wireframe: true, transparent: true, opacity: 0.3 });
        const irisMesh = new THREE.Mesh(irisGeo, irisMat);
        
        // 3. Pupila (Núcleo sólido e vermelho)
        const pupilGeo = new THREE.SphereGeometry(1.8, 16, 16);
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0xff0a33, transparent: true, opacity: 0.8 });
        const pupilMesh = new THREE.Mesh(pupilGeo, pupilMat);

        main3DObject.add(eyeMesh);
        main3DObject.add(irisMesh);
        main3DObject.add(pupilMesh);
        
        scene.add(main3DObject);

        // Partículas flutuantes ao fundo
        const partGeo = new THREE.BufferGeometry();
        const partCount = 600;
        const posArray = new Float32Array(partCount * 3);
        for(let i=0; i < partCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const partMat = new THREE.PointsMaterial({size: 0.2, color: 0xff0a33, transparent: true, opacity: 0.6});
        particles = new THREE.Points(partGeo, partMat);
        scene.add(particles);

        camera.position.z = 30;

        function animate3D() {
            requestAnimationFrame(animate3D); 
            
            const time = Date.now() * 0.0005;

            // Movimento suave do olho observando ao redor
            main3DObject.rotation.y = Math.sin(time * 0.5) * 0.4;
            main3DObject.rotation.x = Math.cos(time * 0.7) * 0.2;
            
            // Íris rodando e Pupila pulsando levemente (orgânico)
            main3DObject.children[1].rotation.z += 0.005;
            const pupilScale = 1 + Math.sin(time * 8) * 0.1;
            main3DObject.children[2].scale.setScalar(pupilScale);

            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;

            camera.position.x = Math.sin(time) * 4;
            camera.position.y = Math.cos(time) * 4;
            camera.lookAt(scene.position);

            main3DObject.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
            if(targetScale > 1) targetScale -= 0.05; 

            renderer.render(scene, camera);
        }
        animate3D();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    // --- FUNÇÕES UTILITÁRIAS ---
    function timeToMs(timeString) {
        const parts = timeString.split(',');
        const timeParts = parts[0].split(':');
        return parseInt(timeParts[0]) * 3600000 + parseInt(timeParts[1]) * 60000 + parseInt(timeParts[2]) * 1000 + parseInt(parts[1]);
    }

    function parseSRT(data) {
        const blocks = data.split(/\n\s*\n/);
        const parsed = [];
        blocks.forEach(block => {
            const lines = block.split('\n');
            if (lines.length >= 3) {
                const times = lines[1].split(' --> ');
                if (times.length === 2) {
                    parsed.push({
                        start: Math.max(0, timeToMs(times[0]) - 200), 
                        end: timeToMs(times[1]) + 300, 
                        text: lines.slice(2).join('<br>')
                    });
                }
            }
        });
        return parsed;
    }

    function formatText(text) {
        let formatted = text;
        outlineKeywords.forEach(kw => { const regex = new RegExp(`\\b${kw}\\b`, 'gi'); formatted = formatted.replace(regex, `<span class="highlight-outline">$&</span>`); });
        solidKeywords.forEach(kw => { const regex = new RegExp(`\\b${kw}\\b`, 'gi'); formatted = formatted.replace(regex, `<span class="highlight-solid">$&</span>`); });
        return formatted;
    }

    function makeLettersKinetic(htmlString) {
        const temp = document.createElement('div');
        temp.innerHTML = htmlString;
        
        let globalCharIndex = 0; 

        function wrapTextNodes(node) {
            if (node.nodeType === 3) {
                const text = node.nodeValue;
                const words = text.split(/(\s+)/);
                const frag = document.createDocumentFragment();

                words.forEach(word => {
                    if (word.trim() === '') {
                        const spaceSpan = document.createElement('span');
                        spaceSpan.innerHTML = '&nbsp;';
                        frag.appendChild(spaceSpan);
                    } else {
                        const wordContainer = document.createElement('span');
                        wordContainer.className = 'k-word';

                        for (let i = 0; i < word.length; i++) {
                            const char = word[i];
                            const span = document.createElement('span');
                            span.innerText = char;
                            span.className = 'k-letter';
                            
                            const delay = (globalCharIndex * 0.04).toFixed(3);
                            span.style.animationName = `hard-pop, subtle-float`;
                            span.style.animationDuration = `0.15s, 2s`; 
                            span.style.animationDelay = `${delay}s, ${delay}s`;
                            span.style.animationTimingFunction = `cubic-bezier(0.175, 0.885, 0.32, 1.275), ease-in-out`;
                            span.style.animationIterationCount = `1, infinite`;
                            span.style.animationDirection = `normal, alternate`;
                            span.style.animationFillMode = `forwards, forwards`;
                            
                            wordContainer.appendChild(span);
                            globalCharIndex++;
                        }
                        frag.appendChild(wordContainer);
                    }
                });
                node.parentNode.replaceChild(frag, node);
            } else if (node.nodeType === 1) {
                Array.from(node.childNodes).forEach(wrapTextNodes);
            }
        }
        Array.from(temp.childNodes).forEach(wrapTextNodes);
        return temp.innerHTML;
    }

    function spawnForegroundElement() {
        if(!isPlaying) return;
        const container = document.getElementById('fg-lights');
        const el = document.createElement('div');
        el.className = 'fg-orb';
        
        const size = Math.random() * 300 + 150; 
        el.style.width = `${size}px`;
        el.style.height = `${size}px`;
        el.style.left = `${Math.random() * 100}vw`;
        el.style.top = `${Math.random() * 100}vh`;
        el.style.filter = `blur(${Math.random() * 20 + 10}px)`; 
        
        el.style.animation = `fg-pass ${Math.random() * 2 + 1}s cubic-bezier(0.4, 0, 0.2, 1) forwards`;
        
        container.appendChild(el);
        setTimeout(() => { if(container.contains(el)) container.removeChild(el); }, 3000);
    }

            initImageLayers();

    document.getElementById('obsCheckbox').addEventListener('change', function(e) {
        const obsFrame = document.getElementById('cinematic-frame');
        if(e.target.checked) { obsFrame.classList.add('active'); } 
        else { obsFrame.classList.remove('active'); }
    });

    document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 'o') {
            document.getElementById('obsCheckbox').checked = !document.getElementById('obsCheckbox').checked;
            document.getElementById('cinematic-frame').classList.toggle('active');
        }
    });

    function initImageLayers() {
        const container = document.getElementById('image-container');
        container.innerHTML = '';
        images.forEach((src, idx) => {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'bg-image';
            if (idx === 0) imgDiv.classList.add('active');
            imgDiv.style.backgroundImage = `url(${src})`;
            imgDiv.id = `img-${idx}`;
            container.appendChild(imgDiv);
        });
    }

    function triggerChicStrobe() {
        const strobe = document.getElementById('strobe-layer');
        strobe.classList.remove('active'); void strobe.offsetWidth; strobe.classList.add('active');
        
        targetScale = 1.35;

        changeImage();
        spawnForegroundElement();
    }

    function changeImage() {
        if(images.length <= 1) return;
        const oldImg = document.getElementById(`img-${currentImageIndex}`);
        if(oldImg) oldImg.classList.remove('active');
        
        let nextIndex; do { nextIndex = Math.floor(Math.random() * images.length); } while (nextIndex === currentImageIndex);
        currentImageIndex = nextIndex;
        
        const newImg = document.getElementById(`img-${currentImageIndex}`);
        if(newImg) newImg.classList.add('active');
    }

    function startVideo() {
        document.getElementById('controls-overlay').style.opacity = 0;
        setTimeout(() => document.getElementById('controls-overlay').style.display = 'none', 600);

        initThreeJS();
        subtitles = parseSRT(srtData);
        initImageLayers();
        isPlaying = true;
        
        if (audioSrc) {
            const player = document.getElementById('audio-player');
            player.play();
            requestAnimationFrame(updateLoopAudio);
        } else {
            startTime = Date.now();
            requestAnimationFrame(updateLoopSimulated);
        }
        
        setInterval(() => { if(!hyperMode) changeImage(); }, 6000);
    }

    function processTime(currentTimeMs) {
        const sub = subtitles.find(s => currentTimeMs >= s.start && currentTimeMs <= s.end);
        const textElement = document.getElementById('current-lyric');

        if (sub) {
            let index = subtitles.indexOf(sub);
            if (index !== currentSrtIndex) {
                currentSrtIndex = index;

                const isHyperText = hyperTriggers.some(t => sub.text.includes(t));
                if (isHyperText && !hyperMode) {
                    hyperMode = true;
                    if(main3DObject) {
                        main3DObject.children[0].material.opacity = 0.35;
                        main3DObject.children[1].material.opacity = 0.8;
                    }
                    hyperInterval = setInterval(triggerChicStrobe, 260); 
                } else if (!isHyperText && hyperMode) {
                    hyperMode = false;
                    if(main3DObject) {
                        main3DObject.children[0].material.opacity = 0.12;
                        main3DObject.children[1].material.opacity = 0.3;
                    }
                    clearInterval(hyperInterval);
                }

                if (sub.text.trim() === '.') {
                    triggerChicStrobe();
                    textElement.style.opacity = 0;
                } else {
                    const formatted = formatText(sub.text);
                    textElement.innerHTML = makeLettersKinetic(formatted);
                    textElement.style.opacity = 1;
                }
            }
        } else {
            textElement.style.opacity = 0;
            currentSrtIndex = -1;
            
            if(hyperMode) {
                hyperMode = false;
                if(main3DObject) {
                    main3DObject.children[0].material.opacity = 0.12;
                    main3DObject.children[1].material.opacity = 0.3;
                }
                clearInterval(hyperInterval);
            }
        }
    }

    function updateLoopAudio() { if (!isPlaying) return; processTime(document.getElementById('audio-player').currentTime * 1000); requestAnimationFrame(updateLoopAudio); }
    function updateLoopSimulated() { if (!isPlaying) return; processTime(Date.now() - startTime); requestAnimationFrame(updateLoopSimulated); }
