<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modularte Studio - Editor Cinematográfico</title>
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Bibliotecas React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Importar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fontes da Marca -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            light: '#F4F1ED',
                            sand: '#D5CABD',
                            taupe: '#8C7D70',
                            dark: '#232323',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#050505] text-white m-0 p-0 overflow-hidden w-screen h-screen font-sans selection:bg-brand-taupe selection:text-white">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ÍCONES DA INTERFACE ---
        const IconBase = ({ children, size = 24, className = "", fill = "none", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Pause = (props) => <IconBase {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></IconBase>;
        const Video = (props) => <IconBase {...props}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;

        // --- SÍMBOLOS DE FUNDO (WATERMARKS) ---
        const SymbolHome = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const SymbolBlocks = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>;
        const SymbolMove = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></svg>;
        const SymbolDiamond = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13"/><path d="M13 3l3 6-4 13"/></svg>;
        const SymbolSparkles = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;

        // Tempos do Vídeo (61.5 Segundos + 5 Segundos de Outro = 66.5s)
        const VIDEO_DURATION = 61.5; 
        const TOTAL_DURATION = 66.5; 

        // DADOS DAS LEGENDAS OTIMIZADOS
        const subtitleData = [
            { id: 1, start: 0.232, end: 1.027, text: "Olá pessoal!" },
            { id: 2, start: 1.027, end: 2.138, text: "Hoje pela primeira vez" },
            { id: 3, start: 2.138, end: 4.160, text: "eu venho falar da Modularte Móveis," },
            { id: 4, start: 4.160, end: 4.658, text: "uma empresa" },
            { id: 5, start: 4.658, end: 5.171, text: "que trabalha" },
            { id: 6, start: 5.171, end: 7.028, text: "com produção de móveis" },
            { id: 7, start: 7.028, end: 7.840, text: "para o lar" },
            { id: 8, start: 7.840, end: 8.404, text: "então contamos" },
            { id: 9, start: 8.404, end: 9.498, text: "com guarda roupas," },
            { id: 10, start: 9.498, end: 11.620, text: "área de cozinha, salas," },
            { id: 11, start: 11.620, end: 12.316, text: "trabalhamos com" },
            { id: 12, start: 12.316, end: 13.393, text: "móveis direcionados" },
            { id: 13, start: 13.393, end: 14.587, text: "para área comercial." },
            { id: 14, start: 14.587, end: 16.178, text: "Toda linha de móveis" },
            { id: 15, start: 16.178, end: 18.217, text: "feita 100%" },
            { id: 16, start: 18.217, end: 20.571, text: "em MDF de alta qualidade." },
            { id: 17, start: 20.571, end: 21.549, text: "Os nossos produtos" },
            { id: 18, start: 21.549, end: 22.792, text: "são com toda a matéria" },
            { id: 19, start: 22.792, end: 24.533, text: "prima de planejados," },
            { id: 20, start: 24.533, end: 26.389, text: "porém em formato modular" },
            { id: 21, start: 26.389, end: 28.147, text: "que traz praticidade," },
            { id: 22, start: 28.147, end: 29.522, text: "traz facilidade" },
            { id: 23, start: 29.522, end: 31.362, text: "e te traz possibilidades" },
            { id: 24, start: 31.362, end: 31.661, text: "de estar" },
            { id: 25, start: 31.661, end: 32.987, text: "movendo esse móvel" },
            { id: 26, start: 32.987, end: 33.584, text: "de um lugar" },
            { id: 27, start: 33.584, end: 35.391, text: "para outro, transporte." },
            { id: 28, start: 35.391, end: 36.203, text: "E nós temos uma" },
            { id: 29, start: 36.203, end: 37.280, text: "linha de produtos" },
            { id: 30, start: 37.280, end: 38.441, text: "com alta qualidade," },
            { id: 31, start: 38.441, end: 39.651, text: "feitos com carinho" },
            { id: 32, start: 39.651, end: 41.358, text: "especialmente para você." },
            { id: 33, start: 41.358, end: 43.845, text: "A Modularte tem o cuidado" },
            { id: 34, start: 43.845, end: 44.922, text: "de produzir móveis" },
            { id: 35, start: 44.922, end: 45.585, text: "que tenha" },
            { id: 36, start: 45.585, end: 47.922, text: "resistência ao transito," },
            { id: 37, start: 47.922, end: 50.392, text: "que possa facilitar para você" },
            { id: 38, start: 50.392, end: 52.663, text: "mais conforto e mais qualidade" },
            { id: 39, start: 52.663, end: 54.470, text: "e mais agilidade" },
            { id: 40, start: 54.470, end: 56.459, text: "para estar decorando sua casa" },
            { id: 41, start: 56.459, end: 56.841, text: "para estar" },
            { id: 42, start: 56.841, end: 57.553, text: "usufruindo" },
            { id: 43, start: 57.553, end: 59.029, text: "dos nossos produtos." },
            { id: 44, start: 59.029, end: 60.322, text: "Então eu te convido" },
            { id: 45, start: 60.322, end: 61.548, text: "vem pra Modularte." }
        ];

        // Palavras-chave para destaque dourado e brilhante
        const keywords = ['Modularte', 'Móveis', '100%', 'MDF', 'alta', 'qualidade', 'modular', 'praticidade', 'facilidade', 'conforto', 'agilidade', 'carinho', 'inteligentes', 'design'];

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [isRecordingMode, setIsRecordingMode] = useState(false);
            const [activeSubtitle, setActiveSubtitle] = useState(null);
            const [activeSymbol, setActiveSymbol] = useState(null);
            const [localVideoUrl, setLocalVideoUrl] = useState('');
            const [isDownloadModalOpen, setIsDownloadModalOpen] = useState(false);
            const [countdown, setCountdown] = useState(null);
            
            // Estado do Outro (Ecrã Final)
            const [isOutroMode, setIsOutroMode] = useState(false);
            const isOutroModeRef = useRef(false);
            
            const videoRef = useRef(null);
            const fileInputRef = useRef(null);
            const timeRef = useRef(0);
            const activeSubRef = useRef(null);
            const previewProgressBarRef = useRef(null);
            const hudTimeRef = useRef(null);

            // LÓGICA DE SÍMBOLOS DINÂMICOS
            const getSymbolForTime = (time) => {
                if (time > 2 && time < 14) return 'home';      
                if (time >= 14 && time < 24) return 'blocks';  
                if (time >= 24 && time < 35) return 'move';    
                if (time >= 35 && time < 45) return 'diamond'; 
                if (time >= 45 && time < 60) return 'sparkles';
                return null;
            };

            // LÓGICA DE ZOOM DINÂMICO
            const getZoomLevel = (time) => {
                if (time >= 2.1 && time <= 7.0) return 1.15;
                if (time >= 16.1 && time <= 20.5) return 1.25;
                if (time >= 24.5 && time <= 31.3) return 1.15;
                if (time >= 41.3 && time <= 52.6) return 1.20;
                if (time >= 59.0 && time <= 61.5) return 1.15;
                return 1.0; 
            };

            const safePlayVideo = () => {
                if (videoRef.current && videoRef.current.networkState !== 3) {
                    const playPromise = videoRef.current.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.warn("Autoplay bloqueado:", error));
                    }
                }
            };

            const togglePlay = () => {
                if (!isPlaying) {
                    if (!isOutroMode) safePlayVideo();
                    setIsPlaying(true);
                } else {
                    if (videoRef.current) videoRef.current.pause();
                    setIsPlaying(false);
                }
            };

            const resetTime = () => {
                timeRef.current = 0;
                isOutroModeRef.current = false;
                setIsOutroMode(false);
                setActiveSymbol(null);
                if (videoRef.current && videoRef.current.readyState > 0) {
                    videoRef.current.currentTime = 0;
                }
                if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = '0%';
                if (hudTimeRef.current) hudTimeRef.current.innerText = '0.00s';
                setActiveSubtitle(null);
                activeSubRef.current = null;
            };

            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    setLocalVideoUrl(url);
                    resetTime();
                }
            };

            useEffect(() => {
                let lastTime = performance.now();
                let frameId;

                const loop = (now) => {
                    if (isPlaying && countdown === null) {
                        let time = timeRef.current;
                        const delta = Math.min((now - lastTime) / 1000, 0.1);
                        
                        if (videoRef.current && !videoRef.current.ended && videoRef.current.readyState >= 2 && !videoRef.current.paused && time < VIDEO_DURATION) {
                            time = videoRef.current.currentTime;
                        } else {
                            time += delta;
                        }
                        
                        timeRef.current = time;

                        const currentOutroMode = time >= VIDEO_DURATION;
                        if (currentOutroMode !== isOutroModeRef.current) {
                            isOutroModeRef.current = currentOutroMode;
                            setIsOutroMode(currentOutroMode);
                            if (currentOutroMode && videoRef.current) {
                                videoRef.current.pause();
                            }
                        }

                        if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = `${(time / TOTAL_DURATION) * 100}%`;
                        if (hudTimeRef.current) hudTimeRef.current.innerText = `${time.toFixed(2)}s`;
                        
                        if (videoRef.current && !currentOutroMode) {
                            videoRef.current.style.transform = `scale(${getZoomLevel(time)})`;
                        }

                        if (!currentOutroMode) {
                            const sub = subtitleData.find(s => time >= s.start && time <= s.end) || null;
                            if (sub?.id !== activeSubRef.current?.id) {
                                activeSubRef.current = sub;
                                setActiveSubtitle(sub);
                            }
                            
                            // Atualiza Símbolo Flutuante
                            const currentSymbol = getSymbolForTime(time);
                            setActiveSymbol(prev => prev !== currentSymbol ? currentSymbol : prev);
                        } else {
                            if (activeSubRef.current !== null) {
                                activeSubRef.current = null;
                                setActiveSubtitle(null);
                                setActiveSymbol(null);
                            }
                        }

                        if (time >= TOTAL_DURATION) {
                            setIsPlaying(false);
                            resetTime();
                        }
                    }
                    lastTime = now;
                    frameId = requestAnimationFrame(loop);
                };

                frameId = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(frameId);
            }, [isPlaying, countdown]);

            const startRecordingMode = () => {
                setIsDownloadModalOpen(false);
                setIsRecordingMode(true);
                resetTime();
                setCountdown(5);
                
                if (videoRef.current) {
                     videoRef.current.play().then(() => {
                         videoRef.current.pause();
                         videoRef.current.currentTime = 0;
                     }).catch(() => {});
                }
            };

            useEffect(() => {
                if (countdown === null) return;
                if (countdown > 0) {
                    const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (countdown === 0) {
                    setCountdown(null);
                    setIsPlaying(true);
                    safePlayVideo();
                }
            }, [countdown]);

            const stopRecordingMode = () => {
                setIsRecordingMode(false);
                setIsPlaying(false);
                setCountdown(null);
                if (videoRef.current) videoRef.current.pause();
            };

            return (
                <div className="flex w-full h-screen bg-[#050505] text-white font-sans overflow-hidden">
                    <style>{`
                        /* COLOR GRADING PREMIUM (Mais quente, brilhante e contrastante) */
                        .color-graded-video {
                            filter: contrast(1.25) brightness(1.1) saturate(1.4) sepia(0.15) hue-rotate(-5deg);
                            transform-origin: 75% 45%; 
                            will-change: transform;
                        }
                        
                        /* VINHETA RICA (Tons de café escuro no lugar do preto puro) */
                        .vignette-effect {
                            background: linear-gradient(90deg, rgba(20,15,10,0.95) 0%, rgba(20,15,10,0.6) 35%, rgba(0,0,0,0) 70%),
                                        radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(20,15,10,0.5) 100%);
                            pointer-events: none;
                        }
                        
                        /* ANIMAÇÕES DAS LEGENDAS COM GLOW E SHIMMER */
                        @keyframes slideUpFadeBlur { 
                            0% { transform: translateY(30px) scale(0.95); opacity: 0; filter: blur(8px); } 
                            100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0px); } 
                        }
                        .word-reveal { 
                            display: inline-block; 
                            animation: slideUpFadeBlur 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
                            opacity: 0; 
                        }
                        
                        .text-glow-white { 
                            text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 25px rgba(255,255,255,0.4); 
                        }
                        .text-glow-gold { 
                            color: #D5CABD; 
                            text-shadow: 0 4px 20px rgba(0,0,0,0.9), 0 0 30px rgba(213,202,189,0.8); 
                        }

                        /* MOVIMENTO CONTÍNUO DOS TEXTOS (Flutuação) */
                        @keyframes continuousFloat {
                            0%, 100% { transform: translateY(0px); }
                            50% { transform: translateY(-8px); }
                        }
                        .floating-text-container {
                            animation: continuousFloat 6s ease-in-out infinite;
                        }

                        /* ANIMAÇÃO WATERMARK CANTO SUPERIOR DIREITO */
                        @keyframes watermarkFloat {
                            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.6; }
                            50% { transform: translateY(-8px) rotate(1deg) scale(1.02); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(213,202,189,0.5)); }
                        }
                        .watermark-float {
                            animation: watermarkFloat 5s ease-in-out infinite;
                        }
                        
                        /* SÍMBOLOS GIGANTES NO FUNDO */
                        @keyframes slowSpinFloat {
                            0% { transform: translate(-20px, 20px) rotate(-5deg) scale(0.9); opacity: 0; }
                            20% { opacity: 0.15; }
                            80% { opacity: 0.15; }
                            100% { transform: translate(30px, -30px) rotate(15deg) scale(1.1); opacity: 0; }
                        }
                        .animate-symbol-bg {
                            animation: slowSpinFloat 10s ease-in-out forwards;
                            filter: drop-shadow(0 0 30px rgba(213,202,189,0.3));
                        }

                        /* ANIMAÇÕES DO OUTRO (MONTAGEM 3D WIDE) */
                        .outro-bg-reveal {
                            animation: fadeBlurIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                        }
                        @keyframes fadeBlurIn {
                            0% { opacity: 0; backdrop-filter: blur(0px); }
                            100% { opacity: 1; backdrop-filter: blur(20px); }
                        }
                        
                        /* Magia 3D montando as linhas da logo (Desenhando o traço) */
                        @keyframes drawLine { 
                            100% { stroke-dashoffset: 0; filter: drop-shadow(0 0 10px rgba(213,202,189,0.4)); opacity: 1; } 
                        }
                        
                        .outro-layer-back { stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0; animation: drawLine 2s ease-out forwards; }
                        .outro-layer-conn { stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0; animation: drawLine 2s 0.6s ease-out forwards; }
                        .outro-layer-front { stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0; animation: drawLine 2s 1.2s ease-out forwards; }
                        
                        /* Flash final do texto da marca na logo WIDE */
                        @keyframes textSvgFadeIn {
                            0% { opacity: 0; transform: translateY(5px); filter: blur(2px); }
                            100% { opacity: 1; transform: translateY(0); filter: drop-shadow(0 4px 10px rgba(255,255,255,0.2)); }
                        }
                        .text-flash-end {
                            opacity: 0;
                            animation: textSvgFadeIn 2s 1.8s ease-out forwards;
                        }
                        .text-flash-end-subtitle {
                            opacity: 0;
                            animation: textSvgFadeIn 2s 2.2s ease-out forwards;
                        }
                    `}</style>

                    {isDownloadModalOpen && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/90 p-4">
                            <div className="bg-[#111] border border-white/10 rounded-3xl p-8 max-w-lg w-full shadow-2xl relative">
                                <h2 className="text-2xl font-bold mb-2 flex items-center gap-3 tracking-tight text-white">
                                    <Video className="text-brand-taupe" size={28} /> Preparar para Gravação
                                </h2>
                                <div className="space-y-4 mt-6">
                                    <div className="p-5 border border-white/10 bg-white/5 rounded-2xl">
                                        <h3 className="font-bold text-white mb-2">Grave com Tela Cheia</h3>
                                        <p className="text-sm text-neutral-400 mb-6 leading-relaxed">
                                            A aplicação irá esconder menus e iniciar contagem de 5s. Utilize o seu gravador de ecrã favorito no PC. O vídeo renderizará em formato Widescreen 16:9.
                                        </p>
                                        <button onClick={startRecordingMode} className="w-full py-3 bg-brand-taupe hover:bg-[#7A6B5E] text-white rounded-xl font-bold transition-colors text-sm flex items-center justify-center gap-2">
                                            <Video size={16} /> LIMPAR TELA E INICIAR CONTAGEM
                                        </button>
                                    </div>
                                </div>
                                <button onClick={() => setIsDownloadModalOpen(false)} className="w-full mt-4 py-3 text-neutral-500 hover:text-white font-bold transition-colors text-sm">
                                    FECHAR
                                </button>
                            </div>
                        </div>
                    )}

                    {!isRecordingMode && (
                        <div className="w-80 h-full border-r border-white/10 bg-[#0d0d0d] p-6 flex flex-col gap-6 z-20 shrink-0 overflow-y-auto shadow-2xl">
                            <div className="space-y-1 pb-4 border-b border-white/5">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-brand-taupe rounded-full flex items-center justify-center font-bold text-sm">M</div>
                                    <h1 className="text-lg font-bold tracking-tight">MODULARTE</h1>
                                </div>
                                <p className="text-[10px] text-neutral-500 font-medium uppercase tracking-[0.2em]">Cinematic Edit - {TOTAL_DURATION}s</p>
                            </div>

                            <div className="space-y-3">
                                <button 
                                    onClick={togglePlay}
                                    className={`w-full py-4 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 ${isPlaying ? 'bg-white text-black shadow-lg' : 'bg-brand-taupe text-white hover:bg-[#7A6B5E] shadow-lg shadow-[#8C7D70]/20'}`}
                                >
                                    {isPlaying ? <Pause size={18} fill="currentColor" /> : <Play size={18} fill="currentColor" />}
                                    {isPlaying ? 'PAUSAR PREVIEW' : 'REPRODUZIR PREVIEW'}
                                </button>
                                <button 
                                    onClick={resetTime}
                                    className="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-semibold flex items-center justify-center gap-2 transition-colors"
                                >
                                    <RefreshCw size={14} /> RESETAR TEMPO
                                </button>
                            </div>

                            <div className="mt-4 pt-4 border-t border-white/5 space-y-2">
                                <input type="file" accept="video/*" className="hidden" ref={fileInputRef} onChange={handleVideoUpload} />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className={`w-full py-3 px-4 rounded-xl border text-[10px] font-bold flex items-center justify-between transition-all tracking-wider ${localVideoUrl ? 'border-brand-sand/50 bg-brand-sand/10 text-brand-sand' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                                >
                                    {localVideoUrl ? 'VÍDEO CARREGADO ✓' : 'CARREGAR VÍDEO LOCAL'}
                                    <Upload size={16} />
                                </button>
                            </div>

                            <div className="mt-auto space-y-4 pt-4">
                                <button 
                                    onClick={() => setIsDownloadModalOpen(true)}
                                    className="w-full py-4 rounded-2xl font-black text-sm shadow-xl transition-all flex flex-col items-center justify-center gap-1 bg-brand-taupe text-white hover:scale-[1.02] shadow-[#8C7D70]/20"
                                >
                                    <div className="flex items-center gap-2">
                                        <Video size={18} />
                                        PREPARAR PARA GRAVAR
                                    </div>
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 h-full flex items-center justify-center relative p-0 sm:p-8 bg-[#050505]">
                        
                        {countdown !== null && countdown > 0 && (
                            <div className="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-[#050505]">
                                <h2 className="text-4xl font-light text-white mb-6 text-center leading-tight">
                                    Inicie a sua gravação<br/>
                                    <span className="text-brand-sand font-medium">A reprodução arranca em:</span>
                                </h2>
                                <div className="text-9xl font-black text-brand-light drop-shadow-[0_0_40px_rgba(213,202,189,0.4)] transition-transform duration-500 scale-110">
                                    {countdown}
                                </div>
                            </div>
                        )}
                        
                        {isRecordingMode && countdown === null && (
                            <button onClick={stopRecordingMode} className="absolute top-6 left-6 z-50 px-4 py-2 bg-red-600/30 hover:bg-red-600 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2 transition-all opacity-20 hover:opacity-100">
                                <Pause size={14} fill="currentColor" /> SAIR DA TELA LIMPA
                            </button>
                        )}

                        {!isRecordingMode && (
                            <div className="absolute top-6 right-6 flex items-center gap-4 z-50 bg-black/80 px-4 py-2 rounded-2xl border border-white/10 hidden sm:flex">
                                <div className="flex flex-col items-end">
                                <span className="text-[9px] font-bold text-neutral-400 uppercase tracking-[0.2em]">Timecode</span>
                                <span ref={hudTimeRef} className="text-xl font-mono text-white tracking-widest leading-none mt-1">0.00s</span>
                                </div>
                            </div>
                        )}

                        {/* --- CANVAS WIDESCREEN (16:9) --- */}
                        <div 
                            className="relative overflow-hidden transition-all duration-500 flex items-center justify-center"
                            style={{ 
                                aspectRatio: '16/9', 
                                width: isRecordingMode ? '100vw' : '100%',
                                maxWidth: isRecordingMode ? 'none' : '1200px',
                                maxHeight: isRecordingMode ? '100vh' : '85vh',
                                backgroundColor: '#1a1a1a',
                                borderRadius: isRecordingMode ? '0px' : '16px',
                                border: isRecordingMode ? 'none' : '1px solid rgba(255,255,255,0.1)',
                                boxShadow: isRecordingMode ? 'none' : '0 30px 60px -20px rgba(0, 0, 0, 0.9)'
                            }}
                        >
                            
                            {/* CAMADA DE VÍDEO */}
                            <div className={`absolute inset-0 w-full h-full bg-[#111] z-0 transition-opacity duration-1000 ${isOutroMode ? 'opacity-0' : 'opacity-100'}`}>
                                <video
                                    ref={videoRef}
                                    src={localVideoUrl}
                                    crossOrigin="anonymous"
                                    className="absolute inset-0 w-full h-full object-cover color-graded-video"
                                    playsInline
                                    preload="auto"
                                />
                                <div className="absolute inset-0 vignette-effect"></div>
                                
                                {/* Símbolos Flutuantes (Atrás do Texto) */}
                                <div className="absolute inset-0 pointer-events-none flex items-center justify-start pl-[5%] overflow-hidden z-[1]">
                                    {activeSymbol === 'home' && <SymbolHome key="home" className="w-[500px] h-[500px] text-brand-sand animate-symbol-bg" />}
                                    {activeSymbol === 'blocks' && <SymbolBlocks key="blocks" className="w-[450px] h-[450px] text-brand-taupe animate-symbol-bg" />}
                                    {activeSymbol === 'move' && <SymbolMove key="move" className="w-[450px] h-[450px] text-brand-sand animate-symbol-bg" />}
                                    {activeSymbol === 'diamond' && <SymbolDiamond key="diamond" className="w-[500px] h-[500px] text-brand-taupe animate-symbol-bg" />}
                                    {activeSymbol === 'sparkles' && <SymbolSparkles key="sparkles" className="w-[450px] h-[450px] text-brand-sand animate-symbol-bg" />}
                                </div>
                                
                                {/* MARCA D'ÁGUA NO CANTO DIREITO (Flutuante) */}
                                <div className="absolute top-6 right-8 w-40 md:w-56 z-20 pointer-events-none watermark-float">
                                    <svg viewBox="0 0 480 120" preserveAspectRatio="xMidYMid meet" fill="none" className="w-full h-auto drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                                        <g transform="translate(10, 5) scale(0.9)">
                                            <path d="M 40 85 V 35 L 65 60 L 90 35 V 85" stroke="#8C7D70" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
                                            <path d="M 25 100 L 40 85 M 25 50 L 40 35 M 50 75 L 65 60 M 75 50 L 90 35 M 75 100 L 90 85" stroke="#D5CABD" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
                                            <path d="M 25 100 V 50 L 50 75 L 75 50 V 100" stroke="#F4F1ED" strokeWidth="4" strokeLinejoin="round" strokeLinecap="round" />
                                        </g>
                                        <text x="120" y="70" fontFamily="Outfit" fontSize="48" fontWeight="300" fill="#F4F1ED" letterSpacing="4">MODULARTE</text>
                                        <text x="125" y="95" fontFamily="Outfit" fontSize="14" fontWeight="400" fill="#D5CABD" letterSpacing="8">MÓVEIS</text>
                                    </svg>
                                </div>
                            </div>

                            {/* CAMADA OUTRO (MODULARTE - WIDE CORRIGIDA) */}
                            <div className={`absolute inset-0 bg-[#151210] z-[5] flex items-center justify-center overflow-hidden ${isOutroMode ? 'outro-bg-reveal' : 'opacity-0 pointer-events-none'}`}>
                                
                                {/* Lindo Fundo do Outro */}
                                <div className="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,rgba(213,202,189,0.15)_0%,transparent_70%)]"></div>
                                
                                {/* Logo Wide (Desenhando o Traço Lado a Lado com o Texto) */}
                                <div className="flex items-center justify-center relative z-10 w-full px-10">
                                    <div className="w-full max-w-[300px] md:max-w-[450px] lg:max-w-[500px] h-auto relative">
                                        <svg viewBox="0 0 520 120" fill="none" preserveAspectRatio="xMidYMid meet" className="w-full h-auto overflow-visible">
                                            {isOutroMode && (
                                                <g transform="translate(30, 5)">
                                                    {/* Ícone 3D Desenhado */}
                                                    <path d="M 40 85 V 35 L 65 60 L 90 35 V 85" stroke="#8C7D70" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" className="outro-layer-back"/>
                                                    <path d="M 25 100 L 40 85 M 25 50 L 40 35 M 50 75 L 65 60 M 75 50 L 90 35 M 75 100 L 90 85" stroke="#D5CABD" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" className="outro-layer-conn"/>
                                                    <path d="M 25 100 V 50 L 50 75 L 75 50 V 100" stroke="#F4F1ED" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" className="outro-layer-front"/>
                                                    
                                                    {/* Texto que faz o Flash e aparece ao lado */}
                                                    <text x="130" y="75" fontFamily="Outfit" fontSize="56" fontWeight="300" fill="#F4F1ED" letterSpacing="4" className="text-flash-end">MODULARTE</text>
                                                    <text x="135" y="100" fontFamily="Outfit" fontSize="16" fontWeight="400" fill="#8C7D70" letterSpacing="8" className="text-flash-end-subtitle">MÓVEIS</text>
                                                </g>
                                            )}
                                        </svg>
                                    </div>
                                </div>
                            </div>

                            {/* CAMADA DAS LEGENDAS COM FLUATUAÇÃO */}
                            <div className={`absolute inset-y-0 left-0 w-2/3 md:w-[55%] p-10 md:p-16 z-20 pointer-events-none flex flex-col justify-center transition-opacity duration-500 ${isOutroMode ? 'opacity-0' : 'opacity-100'}`}>
                                <div className="floating-text-container">
                                    {activeSubtitle && (
                                        <div className="relative">
                                            <div className="flex flex-wrap items-end gap-x-2 gap-y-1">
                                                {activeSubtitle.text.split(' ').map((word, idx) => {
                                                    const cleanWord = word.replace(/[\.,!\?]/g, '').toLowerCase();
                                                    const isKeyword = keywords.map(k => k.toLowerCase()).includes(cleanWord);
                                                    
                                                    const textColorClass = isKeyword ? 'text-glow-gold font-bold' : 'text-[#F4F4F4] text-glow-white font-medium';
                                                    
                                                    return (
                                                        <span key={`${activeSubtitle.id}-${idx}`} className="word-reveal" style={{ animationDelay: `${idx * 0.05}s` }}>
                                                            <span className={`text-[30px] sm:text-[38px] md:text-[46px] lg:text-[54px] leading-[1.1] tracking-tight ${textColorClass}`}>
                                                                {word}
                                                            </span>
                                                        </span>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Barra de Progresso do Editor */}
                            <div className="absolute bottom-0 left-0 w-full h-1 bg-black/40 z-30">
                                <div ref={previewProgressBarRef} className="h-full bg-brand-taupe shadow-[0_0_15px_rgba(213,202,189,0.9)]" style={{ width: '0%' }}></div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
