<style>
:root {
  --red: #ff0a33;
  --pink: #ff5fa0;
  --cyan: #00f5ff;
  --yellow: #ffe600;
  --lime: #a0ff00;
  --purple: #bf00ff;
  --white: #ffffff;
  --dark: #03000a;
}
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;background:var(--dark);overflow:hidden;font-family:'Space Grotesk',sans-serif;}

/* Y2K scanlines overlay */
body::after{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:20;
}

/* Controls */
#controls-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(3,0,10,0.97);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;
  transition:opacity 0.6s;
}
.control-box{
  padding:50px 60px;text-align:center;
  border:1px solid var(--cyan);
  box-shadow:0 0 40px rgba(0,245,255,0.3),0 0 80px rgba(255,10,51,0.2),inset 0 0 60px rgba(0,0,0,0.8);
  border-radius:4px;position:relative;
}
.control-box::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--pink),var(--cyan),transparent);
}
.control-box h1{
  font-family:'Syne',sans-serif;font-size:3rem;text-transform:uppercase;margin:0 0 4px;
  color:var(--white);letter-spacing:6px;
  text-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan),0 0 40px var(--red),0 0 80px var(--red);
}
.subtitle-tag{
  font-size:11px;letter-spacing:4px;color:var(--cyan);margin-bottom:35px;
  text-shadow:0 0 10px var(--cyan);
}
.btn-play{
  margin-top:30px;background:transparent;color:var(--cyan);
  border:1px solid var(--cyan);padding:15px 60px;
  font-family:'Syne';font-weight:800;font-size:1.1rem;cursor:pointer;
  text-transform:uppercase;letter-spacing:6px;
  box-shadow:0 0 20px rgba(0,245,255,0.4),inset 0 0 20px rgba(0,245,255,0.1);
  transition:all 0.3s;
}
.btn-play:hover{
  background:var(--cyan);color:#000;
  box-shadow:0 0 40px var(--cyan),0 0 80px var(--cyan);transform:scale(1.04);
}
.file-input-wrapper{display:flex;flex-direction:column;align-items:center;margin:12px 0;}
.custom-file-upload{
  display:inline-block;padding:8px 16px;cursor:pointer;font-size:11px;
  letter-spacing:2px;color:#aaa;border:1px solid rgba(255,255,255,0.1);
  text-transform:uppercase;transition:0.3s;border-radius:2px;
}
.custom-file-upload:hover{color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 10px rgba(0,245,255,0.3);}
input[type="file"]{display:none;}
.obs-toggle-wrapper{margin-top:25px;display:flex;align-items:center;gap:10px;color:#aaa;font-size:11px;letter-spacing:2px;cursor:pointer;transition:0.3s;}
.obs-toggle-wrapper:hover{color:var(--cyan);}

/* Stage */
#stage{position:relative;width:100%;height:100%;background:#000;}
#image-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
.bg-image{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background-size:cover;background-position:center;opacity:0;
  filter:grayscale(0.5) contrast(1.4) brightness(0.25) hue-rotate(20deg);
  transition:opacity 0.6s ease-in-out;transform:scale(1.05);
}
.bg-image.active{opacity:1;animation:chic-breathe 15s linear infinite alternate;}
@keyframes chic-breathe{0%{transform:scale(1.05) translate(0,0)}100%{transform:scale(1.15) translate(-1%,1%)}}

.ambient-layer{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;
  background:radial-gradient(ellipse at center,transparent 10%,rgba(3,0,10,0.85) 90%);
  pointer-events:none;
}

/* Y2K chromatic vignette */
.chroma-vignette{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 50%,transparent 40%,rgba(0,245,255,0.04) 100%),
    radial-gradient(ellipse at 0% 50%,rgba(191,0,255,0.05) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 50%,rgba(255,10,51,0.05) 0%,transparent 50%);
}

#canvas-3d{position:absolute;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none;opacity:0.95;mix-blend-mode:screen;}

#lyrics-container{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:6;
  display:flex;padding:5%;box-sizing:border-box;align-items:center;justify-content:center;
  perspective:1200px;
}

#fg-lights{position:absolute;top:0;left:0;width:100%;height:100%;z-index:7;pointer-events:none;overflow:hidden;}

/* Y2K grid lines */
#grid-layer{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,245,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,0.04) 1px,transparent 1px);
  background-size:60px 60px;
  animation:grid-scroll 20s linear infinite;
}
@keyframes grid-scroll{0%{background-position:0 0}100%{background-position:60px 60px}}

/* OBS Frame */
#cinematic-frame{position:absolute;top:0;left:0;width:100%;height:100%;z-index:9;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;opacity:0;transition:opacity 0.5s;}
#cinematic-frame.active{opacity:1;}
.cinema-bar{width:100%;height:10%;background:#000;position:relative;}
.cam-cross{position:absolute;width:20px;height:20px;}
.cam-cross::before,.cam-cross::after{content:'';position:absolute;background:rgba(0,245,255,0.6);}
.cam-cross::before{top:50%;left:0;width:100%;height:1px;}
.cam-cross::after{left:50%;top:0;height:100%;width:1px;}
.cross-tl{top:15%;left:5%}.cross-tr{top:15%;right:5%}
.cross-bl{bottom:15%;left:5%}.cross-br{bottom:15%;right:5%}
.rec-dot{position:absolute;top:15%;right:50%;transform:translateX(50%);color:var(--red);font-family:monospace;font-size:13px;letter-spacing:4px;animation:rec-blink 1s infinite;text-shadow:0 0 8px var(--red);}
@keyframes rec-blink{0%,100%{opacity:1}50%{opacity:0}}

/* Strobe */
#strobe-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;opacity:0;pointer-events:none;}
#strobe-layer.active{animation:chic-strobe 0.18s ease-out;}
@keyframes chic-strobe{0%{background:var(--cyan);opacity:0.35}50%{background:var(--red);opacity:0.2}100%{opacity:0}}

/* RGB glitch overlay */
#glitch-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:11;pointer-events:none;opacity:0;}
#glitch-layer.active{animation:rgb-glitch 0.15s steps(1) forwards;}
@keyframes rgb-glitch{
  0%{opacity:1;box-shadow:inset 4px 0 rgba(0,245,255,0.3),inset -4px 0 rgba(255,10,51,0.3)}
  50%{opacity:0.5;box-shadow:inset -6px 0 rgba(0,245,255,0.2),inset 6px 0 rgba(255,10,51,0.2)}
  100%{opacity:0}
}

/* TYPOGRAPHY */
.lyric-line{
  font-family:'Syne',sans-serif;font-size:8vw;font-weight:800;
  text-transform:uppercase;line-height:0.95;width:100%;text-align:center;will-change:transform;
}
.k-word{display:inline-block;white-space:nowrap;margin-right:2vw;}
.k-letter{
  display:inline-block;opacity:0;
  color:#fff;
  text-shadow:0 0 8px #fff,0 0 20px var(--red),0 0 40px var(--red),0 0 80px rgba(255,10,51,0.5);
}

@keyframes hard-pop{
  0%{transform:scale(1.8) translateY(40px) rotate(-3deg);opacity:0;filter:blur(4px);}
  5%{opacity:1;filter:blur(0);}
  100%{transform:scale(1) translateY(0) rotate(0);opacity:1;}
}
@keyframes subtle-float{
  0%{transform:translateY(0) scale(1);}
  100%{transform:translateY(-5px) scale(1.02);}
}

/* HIGHLIGHTS — todos com contraste máximo */
.highlight-solid{
  color:#000 !important;
  background:var(--red) !important;
  text-shadow:none !important;
  box-shadow:0 0 20px var(--red),0 0 40px var(--red),0 0 80px rgba(255,10,51,0.5);
  border-radius:4px;padding:0 6px;
  -webkit-text-stroke:0 !important;font-weight:900;
}
.highlight-outline{
  color:transparent !important;
  -webkit-text-stroke:2px var(--cyan);
  filter:drop-shadow(0 0 8px var(--cyan)) drop-shadow(0 0 20px var(--cyan));
  text-shadow:none !important;
}
.highlight-cyan{
  color:#000 !important;
  background:var(--cyan) !important;
  text-shadow:none !important;
  box-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan),0 0 80px rgba(0,245,255,0.5);
  border-radius:4px;padding:0 6px;
  -webkit-text-stroke:0 !important;font-weight:900;
}
.highlight-yellow{
  color:#000 !important;
  background:var(--yellow) !important;
  text-shadow:none !important;
  box-shadow:0 0 20px var(--yellow),0 0 50px rgba(255,230,0,0.5);
  border-radius:4px;padding:0 6px;
  -webkit-text-stroke:0 !important;font-weight:900;
}
.highlight-lime{
  color:#000 !important;
  background:var(--lime) !important;
  text-shadow:none !important;
  box-shadow:0 0 20px var(--lime),0 0 50px rgba(160,255,0,0.5);
  border-radius:4px;padding:0 6px;
  -webkit-text-stroke:0 !important;font-weight:900;
}
.highlight-purple{
  color:#fff !important;
  background:var(--purple) !important;
  text-shadow:none !important;
  box-shadow:0 0 20px var(--purple),0 0 50px rgba(191,0,255,0.5);
  border-radius:4px;padding:0 6px;
  -webkit-text-stroke:0 !important;font-weight:900;
}

/* foreground orbs */
.fg-orb{position:absolute;border-radius:50%;pointer-events:none;mix-blend-mode:screen;}
@keyframes fg-pass{0%{transform:translate(0,0) scale(1);opacity:0}30%{opacity:1}100%{transform:translate(200px,-200px) scale(3);opacity:0}}

/* Y2K corner decorations */
.corner-deco{
  position:absolute;width:60px;height:60px;z-index:8;pointer-events:none;
  border-color:var(--cyan);border-style:solid;border-width:0;
}
.corner-deco.tl{top:20px;left:20px;border-top-width:1px;border-left-width:1px;box-shadow:-5px -5px 15px rgba(0,245,255,0.3);}
.corner-deco.tr{top:20px;right:20px;border-top-width:1px;border-right-width:1px;box-shadow:5px -5px 15px rgba(0,245,255,0.3);}
.corner-deco.bl{bottom:20px;left:20px;border-bottom-width:1px;border-left-width:1px;box-shadow:-5px 5px 15px rgba(0,245,255,0.3);}
.corner-deco.br{bottom:20px;right:20px;border-bottom-width:1px;border-right-width:1px;box-shadow:5px 5px 15px rgba(0,245,255,0.3);}

/* BPM pulse ring */
#pulse-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;z-index:5;pointer-events:none;opacity:0;
  border:1px solid var(--cyan);
}
#pulse-ring.pulse{animation:ring-expand 0.5s ease-out forwards;}
@keyframes ring-expand{0%{width:80px;height:80px;opacity:0.8;border-color:var(--cyan);}100%{width:600px;height:600px;opacity:0;border-color:var(--red);}}
</style>

let subtitles=[],images=[

];
let audioSrc=null,isPlaying=false,currentSrtIndex=-1,currentImageIndex=0,startTime=0;
const hyperTriggers=['glory hole','Hey!','scream','choke','hole'];
let hyperMode=false,hyperInterval=null;
let scene,camera,renderer,main3DObject,particles,targetScale=1;

function initThreeJS(){
  const container=document.getElementById('canvas-3d');
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  container.appendChild(renderer.domElement);
  main3DObject=new THREE.Group();

  const eyeGeo=new THREE.SphereGeometry(14,32,16);
  const eyeMat=new THREE.MeshBasicMaterial({color:0x00f5ff,wireframe:true,transparent:true,opacity:0.1});
  const eyeMesh=new THREE.Mesh(eyeGeo,eyeMat);
  eyeMesh.scale.set(1,0.35,0.6);

  const irisGeo=new THREE.TorusGeometry(4.5,0.15,16,80);
  const irisMat=new THREE.MeshBasicMaterial({color:0x00f5ff,transparent:true,opacity:0.5});
  const irisMesh=new THREE.Mesh(irisGeo,irisMat);

  const ring2Geo=new THREE.TorusGeometry(7,0.08,8,64);
  const ring2Mat=new THREE.MeshBasicMaterial({color:0xff0a33,transparent:true,opacity:0.4});
  const ring2Mesh=new THREE.Mesh(ring2Geo,ring2Mat);

  const pupilGeo=new THREE.SphereGeometry(1.5,16,16);
  const pupilMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9});
  const pupilMesh=new THREE.Mesh(pupilGeo,pupilMat);

  const glowGeo=new THREE.TorusGeometry(10,0.05,8,80);
  const glowMat=new THREE.MeshBasicMaterial({color:0xbf00ff,transparent:true,opacity:0.3});
  const glowRing=new THREE.Mesh(glowGeo,glowMat);

  main3DObject.add(eyeMesh,irisMesh,ring2Mesh,pupilMesh,glowRing);
  scene.add(main3DObject);

  const partGeo=new THREE.BufferGeometry();
  const partCount=1000;
  const posArray=new Float32Array(partCount*3);
  const colArray=new Float32Array(partCount*3);
  const colors=[[1,0.04,0.2],[0,0.96,1],[0.75,0,1],[1,0.9,0],[0.63,1,0]];
  for(let i=0;i<partCount;i++){
    posArray[i*3]=(Math.random()-0.5)*120;
    posArray[i*3+1]=(Math.random()-0.5)*120;
    posArray[i*3+2]=(Math.random()-0.5)*120;
    const c=colors[Math.floor(Math.random()*colors.length)];
    colArray[i*3]=c[0];colArray[i*3+1]=c[1];colArray[i*3+2]=c[2];
  }
  partGeo.setAttribute('position',new THREE.BufferAttribute(posArray,3));
  partGeo.setAttribute('color',new THREE.BufferAttribute(colArray,3));
  const partMat=new THREE.PointsMaterial({size:0.25,vertexColors:true,transparent:true,opacity:0.7});
  particles=new THREE.Points(partGeo,partMat);
  scene.add(particles);
  camera.position.z=30;

  function animate3D(){
    requestAnimationFrame(animate3D);
    const t=Date.now()*0.0005;
    main3DObject.rotation.y=Math.sin(t*0.5)*0.5;
    main3DObject.rotation.x=Math.cos(t*0.7)*0.25;
    main3DObject.children[1].rotation.z+=0.008;
    main3DObject.children[2].rotation.z-=0.004;
    main3DObject.children[4].rotation.z+=0.002;
    const ps=1+Math.sin(t*10)*0.12;
    main3DObject.children[3].scale.setScalar(ps);
    particles.rotation.y+=0.0015;
    particles.rotation.x+=0.0007;
    camera.position.x=Math.sin(t)*5;
    camera.position.y=Math.cos(t)*3;
    camera.lookAt(scene.position);
    main3DObject.scale.lerp(new THREE.Vector3(targetScale,targetScale,targetScale),0.08);
    if(targetScale>1)targetScale-=0.03;
    renderer.render(scene,camera);
  }
  animate3D();
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

function timeToMs(t){
  const p=t.split(','),tp=p[0].split(':');
  return parseInt(tp[0])*3600000+parseInt(tp[1])*60000+parseInt(tp[2])*1000+parseInt(p[1]);
}
function parseSRT(data){
  const blocks=data.split(/\n\s*\n/),parsed=[];
  blocks.forEach(b=>{
    const lines=b.split('\n');
    if(lines.length>=3){
      const times=lines[1].split(' --> ');
      if(times.length===2)parsed.push({start:Math.max(0,timeToMs(times[0])-200),end:timeToMs(times[1])+300,text:lines.slice(2).join('<br>')});
    }
  });
  return parsed;
}

function formatText(text){
  let f=text;
  [
    ['glory hole','highlight-outline'],
    ['hey!','highlight-solid'],
    ['go!','highlight-solid'],
    ['scream','highlight-yellow'],
    ['choke','highlight-yellow'],
    ['bite','highlight-yellow'],
    ['yeah','highlight-yellow'],
    ['hungry','highlight-lime'],
    ['lick','highlight-lime'],
    ['dark','highlight-purple'],
    ['throat','highlight-purple'],
    ['divine','highlight-cyan'],
    ['alive','highlight-cyan'],
    ['hope','highlight-cyan'],
    ['hole','highlight-outline'],
  ].forEach(([kw,cls])=>{
    const rx=new RegExp(`\\b${kw}\\b`,'gi');
    f=f.replace(rx,m=>`<span class="${cls}">${m}</span>`);
  });
  return f;
}

function makeLettersKinetic(html){
  const temp=document.createElement('div');
  temp.innerHTML=html;
  let gi=0;
  function wrap(node){
    if(node.nodeType===3){
      const words=node.nodeValue.split(/(\s+)/);
      const frag=document.createDocumentFragment();
      words.forEach(w=>{
        if(w.trim()===''){const s=document.createElement('span');s.innerHTML='&nbsp;';frag.appendChild(s);}
        else{
          const wc=document.createElement('span');wc.className='k-word';
          for(let i=0;i<w.length;i++){
            const s=document.createElement('span');s.innerText=w[i];s.className='k-letter';
            const d=(gi*0.04).toFixed(3);
            s.style.cssText=`animation-name:hard-pop,subtle-float;animation-duration:0.15s,2.5s;animation-delay:${d}s,${d}s;animation-timing-function:cubic-bezier(0.175,0.885,0.32,1.275),ease-in-out;animation-iteration-count:1,infinite;animation-direction:normal,alternate;animation-fill-mode:forwards,forwards;`;
            wc.appendChild(s);gi++;
          }
          frag.appendChild(wc);
        }
      });
      node.parentNode.replaceChild(frag,node);
    } else if(node.nodeType===1){
      Array.from(node.childNodes).forEach(wrap);
    }
  }
  Array.from(temp.childNodes).forEach(wrap);
  return temp.innerHTML;
}

function pulseRing(){
  const r=document.getElementById('pulse-ring');
  r.classList.remove('pulse');void r.offsetWidth;r.classList.add('pulse');
}

function spawnForegroundElement(){

  const container=document.getElementById('fg-lights');

  el.className='fg-orb';
  const size=Math.random()*400+100;
  const colors=['rgba(0,245,255,0.4)','rgba(255,10,51,0.4)','rgba(191,0,255,0.4)','rgba(255,230,0,0.3)'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  el.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;filter:blur(${Math.random()*30+20}px);background:radial-gradient(circle,${c} 0%,transparent 70%);animation:fg-pass ${Math.random()*2+0.8}s cubic-bezier(0.4,0,0.2,1) forwards;`;
  container.appendChild(el);
  setTimeout(()=>{if(container.contains(el))container.removeChild(el);},3000);
}

function initImageLayers(){
  const container=document.getElementById('image-container');
  container.innerHTML='';
  images.forEach((src,idx)=>{
    const d=document.createElement('div');
    d.className='bg-image'+(idx===0?' active':'');
    d.style.backgroundImage=`url(${src})`;
    d.id=`img-${idx}`;
    container.appendChild(d);
  });
}

function triggerChicStrobe(){
  const strobe=document.getElementById('strobe-layer');
  strobe.classList.remove('active');void strobe.offsetWidth;strobe.classList.add('active');
  const glitch=document.getElementById('glitch-layer');
  glitch.classList.remove('active');void glitch.offsetWidth;glitch.classList.add('active');
  targetScale=1.4;
  pulseRing();
  changeImage();
  spawnForegroundElement();
}

function changeImage(){
  if(images.length<=1)return;
  const old=document.getElementById(`img-${currentImageIndex}`);
  if(old)old.classList.remove('active');
  let next;do{next=Math.floor(Math.random()*images.length);}while(next===currentImageIndex);
  currentImageIndex=next;
  const newImg=document.getElementById(`img-${currentImageIndex}`);
  if(newImg)newImg.classList.add('active');
}

function startVideo(){
  document.getElementById('controls-overlay').style.opacity=0;
  setTimeout(()=>document.getElementById('controls-overlay').style.display='none',600);
  initThreeJS();
  subtitles=parseSRT(srtData);
  initImageLayers();
  isPlaying=true;
  if(audioSrc){
    document.getElementById('audio-player').play();
    requestAnimationFrame(updateLoopAudio);
  } else {
    startTime=Date.now();
    requestAnimationFrame(updateLoopSimulated);
  }
  setInterval(()=>{if(!hyperMode)changeImage();},6000);
}

function processTime(ms){
  const sub=subtitles.find(s=>ms>=s.start&&ms<=s.end);
  const el=document.getElementById('current-lyric');
  if(sub){
    const idx=subtitles.indexOf(sub);
    if(idx!==currentSrtIndex){
      currentSrtIndex=idx;
      const isHyper=hyperTriggers.some(t=>sub.text.includes(t));
      if(isHyper&&!hyperMode){
        hyperMode=true;
        if(main3DObject){
          main3DObject.children[0].material.opacity=0.25;
          main3DObject.children[1].material.opacity=0.9;
          main3DObject.children[1].material.color.setHex(0xffe600);
        }
        hyperInterval=setInterval(triggerChicStrobe,250);
      } else if(!isHyper&&hyperMode){
        hyperMode=false;
        if(main3DObject){
          main3DObject.children[0].material.opacity=0.1;
          main3DObject.children[1].material.opacity=0.5;
          main3DObject.children[1].material.color.setHex(0x00f5ff);
        }
        clearInterval(hyperInterval);
      }
      if(sub.text.trim()==='.'){
        triggerChicStrobe();
        el.style.opacity=0;
      } else {
        const formatted=formatText(sub.text);
        el.innerHTML=makeLettersKinetic(formatted);
        el.style.opacity=1;
      }
    }
  } else {
    el.style.opacity=0;
    currentSrtIndex=-1;
    if(hyperMode){
      hyperMode=false;
      if(main3DObject){
        main3DObject.children[0].material.opacity=0.1;
        main3DObject.children[1].material.opacity=0.5;
        main3DObject.children[1].material.color.setHex(0x00f5ff);
      }
      clearInterval(hyperInterval);
    }
  }
}

function updateLoopAudio(){if(!isPlaying)return;processTime(document.getElementById('audio-player').currentTime*1000);requestAnimationFrame(updateLoopAudio);}
function updateLoopSimulated(){if(!isPlaying)return;processTime(Date.now()-startTime);requestAnimationFrame(updateLoopSimulated);}
