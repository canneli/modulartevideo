<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Cinematográfico - 7 Minutos e 10 Segundos</title>
    
    <!-- Importar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importar Bibliotecas React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Importar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },

                            light: '#F4F1ED',

            }
        }
    </script>
</head>
<body class="bg-[#050505] text-white m-0 p-0 overflow-hidden w-screen h-screen font-sans selection:bg-brand-taupe selection:text-white">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ÍCONES DA INTERFACE ---
        const IconBase = ({ children, size = 24, className = "", fill = "none", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"/></IconBase>;
        const Pause = (props) => <IconBase {...props}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></IconBase>;
        const Video = (props) => <IconBase {...props}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>;

        // --- SÍMBOLOS DE FUNDO (WATERMARKS ABSTRATOS TEMÁTICOS) ---
        const SymbolSun = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const SymbolInfinity = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18.178 8c5.096 0 5.096 8 0 8-5.095 0-7.133-8-12.355-8-5.096 0-5.096 8 0 8 5.095 0 7.133-8 12.355-8z"/></svg>;
        const SymbolTime = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg>;
        const SymbolDiamond = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13"/><path d="M13 3l3 6-4 13"/></svg>;
        const SymbolSparkles = (props) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;

        // TEMPOS DO VÍDEO (7 Minutos e 10 Segundos = 430 Segundos)
        const VIDEO_DURATION = 430; 
        const TOTAL_DURATION = 430; 

        // LETRA DA MÚSICA (DIVIDIDA EM BLOCOS PARA LEGENDA)
        const lyricsText = [
            "Dizem que você sai da sua quebrada.",
            "Mas a sua quebrada nunca sai de você.",
            "Disso eu tenho certeza.",
            "As lembranças ficaram ecoando na minha mente.",
            "De um passado tão gostoso e reluzente.",
            "Deixa eu voltar. Quero voltar.",
            "Entrar na máquina do tempo é só ilusão. Eu sei.",
            "Quero voltar. Quero viver.",
            "O mesmo sonho de encontrar você.",
            "As lembranças e boa na mente, igual sino na capela.",
            "Um passado reluzente. Vida simples, rua bela.",
            "Cada dia uma história. Brota forte na memória.",
            "Coisa boa, coisa louca, cena vivada, trajetória.",
            "Tipo o dia que negão de mandinha, chegou causando pavor.",
            "Domingão de quebrada, alguém gritou.",
            "No calor, bicho veio montado, cavalo batendo no chão.",
            "Vacão brilhando na mão. Parecia cena de filmão.",
            "Rapaziada, debandou cada um pra um lado na pressão.",
            "Peto se escondeu ligeiro debaixo de um caminhão.",
            "Vio de Miralba voando, pulou muro na agonia.",
            "Quando viu, já tava longe, lá na rua de Jardim corria, negão.",
            "Riscando o facão no chão. Silêncio geral.",
            "Ninguém falou nada. Respeito total.",
            "Depois montou no cavalo, sem pressa, sem discussão.",
            "E foi embora, deixando história na recordada.",
            "Voltar, quero voltar.",
            "Entrar na máquina do tempo. É só ilusão. Eu sei, quero voltar.",
            "Quero voltar. O mesmo sonho. E de novo encontrar você.",
            "Bem umas lembranças, vaga que volta de vez em quando.",
            "A galera jogando bola na igreja. O campinho lotando.",
            "E no meio da bagunça. Molecada na correria.",
            "Correndo atrás de Neydin e o da Cearense. Todo dia.",
            "Eu nem tava nessa fita, nem tava na confusão.",
            "Mas levei um cascudo de jolo e sou palito sem explicação.",
            "O babo rolava solto. Amizade era na moral.",
            "Mas quando a bola caía na casa de Mariacutia. Era fatal, tal.",
            "Ela até devolvia, mas na maior implicância.",
            "Voltava toda furada de faca. Acabava a infância.",
            "A brincadeira parava, todo mundo reclamando.",
            "Mas no outro dia tava lá, mesma turma jogando.",
            "De repente um tumulto corre e corre na quebrada.",
            "Todo mundo olhando o Mauro de Nainha e Evando, saindo na pancada.",
            "Era soco, era voadora, ninguém segurava o vendaval.",
            "Começou na casa de Rosinha e foi parar e é linado lá em cima no final.",
            "A briga por emoção, parecia até decisão.",
            "E vê, velho com um galo no braço, gritando na multidão.",
            "Meus filhos não briguem não.",
            "Outra treta pesada, também virou tradição.",
            "Quando o lado de Madalena saiu na mão com o Paulo do break, irmão.",
            "Os caras pareciam profissional, luta sem vacilação.",
            "Tipo o Mike Tyson no auge, pancadaria de campeão.",
            "Deixa eu voltar. Quero voltar.",
            "Entrar na máquina do tempo. É só ilusão. Eu sei.",
            "Quero voltar. Quero viver. O mesmo sonho. E de novo encontrar você.",
            "Me recordo com tristeza dos anos 92, 90 e três.",
            "Uma fatalidade que o bairro inteiro nunca esqueceu de vez.",
            "Um carro desgovernado, bateu forte num poste da rua.",
            "Alta tensão balançando, faz carrasgando a lua.",
            "Curto o circuito no fio, perigo espalhado no chão.",
            "Uma criança se assustou e saiu correndo na direção.",
            "Pisou no fio caído. Tragédia no mesmo instante.",
            "Silêncio virou desespero. Um choque brutal e marcante.",
            "Mas um heroína da quebrada mostrou coragem total.",
            "Nossa querida dona anália, num gesto puro e leal.",
            "Não pensou duas vezes ao ver o neto e perigo.",
            "Correu pra salvar a criança, enfrentando o inimigo.",
            "Mas o destino foi cruel naquele momento final.",
            "Ela não resistiu ao choque, silêncio na capital.",
            "Lembro da aflição da rua. Do desespero na multidão.",
            "Paulo, seu filho, chorando sem chão no coração.",
            "Rosinha mãe de netinha. Sofrimento sem igual.",
            "E pode chorando, desesperado naquele cenário fatal.",
            "O luto foi pesado, pesado demais pra aceitar.",
            "Eu abracei meu amigo Tiago sem saber o que falar.",
            "Ele perdeu a avó e o irmão naquele mesmo dia.",
            "Choramos juntos bastante. Tor que até hoje arrepia.",
            "Outro momento triste, marcou nossa caminhada.",
            "Quando o filho de seu Miro perdeu a vida na estrada,",
            "e cu era querido por toda aquela gente.",
            "Mas o destino chegou de forma dura e diferente.",
            "Um escote vindo de outra estrada.",
            "Tirou sua vida num segundo inesperado.",
            "A notícia caiu pesada em toda a população.",
            "Mas uma vez a quebrada, viste um luto no coração.",
            "E uma frase dele ficou gravada na memória.",
            "Palavras simples que viraram parte da história.",
            "Lembra de mim, meu senhor? Quando entrar no seu reino.",
            "Silêncio na rua. E o choro quebrando sereno.",
            "Deixa eu voltar. Quero voltar.",
            "Entrar na máquina do tempo. É só ilusão. Eu sei, quero voltar.",
            "Quero voltar. No mesmo sonho. E quem encontra você."
        ];

        // GERADOR DINÂMICO DE TEMPO DE LEGENDA
        const totalChars = lyricsText.reduce((acc, line) => acc + line.length, 0);
        let accumulatedTime = 1.0; // Iniciar as legendas no segundo 1
        
        const initialSubtitleData = lyricsText.map((text, index) => {
            // Distribuição do tempo baseado na quantidade de texto com 0.3s de folga/respiro
            const duration = (text.length / totalChars) * (VIDEO_DURATION - 8 - (lyricsText.length * 0.3)); 
            const start = accumulatedTime;
            const end = start + duration;
            accumulatedTime = end + 0.3; // Avança para a próxima e aplica folga
            return { id: index + 1, start, end, text };
        });

        // Palavras-chave para destaque dourado e brilhante
        const keywords = ['quebrada', 'lembranças', 'passado', 'voltar', 'viver', 'sonho', 'memória', 'história', 'saudade', 'tradição', 'ilusão', 'coração', 'respeito', 'amizade', 'fatalidade', 'coragem', 'heroína', 'destino', 'população', 'reino', 'luto', 'briga', 'tristeza'];

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [isRecordingMode, setIsRecordingMode] = useState(false);
            const [activeSubtitle, setActiveSubtitle] = useState(null);
            const [activeSymbol, setActiveSymbol] = useState(null);
            const [localVideoUrl, setLocalVideoUrl] = useState('');
            const [isDownloadModalOpen, setIsDownloadModalOpen] = useState(false);
            const [isTimingEditorOpen, setIsTimingEditorOpen] = useState(false);
            const [countdown, setCountdown] = useState(null);
            const [subtitles, setSubtitles] = useState(initialSubtitleData);
            
            const videoRef = useRef(null);
            const fileInputRef = useRef(null);
            const timeRef = useRef(0);
            const activeSubRef = useRef(null);
            const subtitlesRef = useRef(subtitles);
            const previewProgressBarRef = useRef(null);
            const hudTimeRef = useRef(null);

            // Mantém as referências sincronizadas com o estado mais atual
            useEffect(() => {
                subtitlesRef.current = subtitles;
            }, [subtitles]);

            // Atualiza os tempos específicos de uma legenda
            const updateSubtitleTime = (id, field, value) => {
                const numValue = parseFloat(value);
                if (isNaN(numValue)) return;
                setSubtitles(prev => prev.map(sub => sub.id === id ? { ...sub, [field]: numValue } : sub));
            };

            // LÓGICA DE SÍMBOLOS DINÂMICOS (Giram durante os 7 min)
            const getSymbolForTime = (time) => {
                const symbols = ['sun', 'infinity', 'time', 'diamond', 'sparkles'];
                const cycleDuration = 30; // cada um fica visível 30 segundos
                const index = Math.floor((time % (cycleDuration * symbols.length)) / cycleDuration);
                return symbols[index];
            };

            // LÓGICA DE ZOOM DINÂMICO CONTÍNUO
            const getZoomLevel = (time) => {
                // Oscilação suave e contínua do zoom entre 1.05x e 1.25x
                return 1.15 + Math.sin(time * 0.15) * 0.10;
            };

            const safePlayVideo = () => {
                if (videoRef.current && videoRef.current.networkState !== 3) {
                    const playPromise = videoRef.current.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => console.warn("Autoplay bloqueado:", error));
                    }
                }
            };

            const togglePlay = () => {
                if (!isPlaying) {
                    safePlayVideo();
                    setIsPlaying(true);
                } else {
                    if (videoRef.current) videoRef.current.pause();
                    setIsPlaying(false);
                }
            };

            const resetTime = () => {
                timeRef.current = 0;
                setActiveSymbol(null);
                if (videoRef.current && videoRef.current.readyState > 0) {
                    videoRef.current.currentTime = 0;
                }
                if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = '0%';
                if (hudTimeRef.current) hudTimeRef.current.innerText = '0.00s';
                setActiveSubtitle(null);
                activeSubRef.current = null;
            };

            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    setLocalVideoUrl(url);
                    resetTime();
                }
            };

            useEffect(() => {
                let lastTime = performance.now();
                let frameId;

                const loop = (now) => {
                    if (isPlaying && countdown === null) {
                        let time = timeRef.current;
                        const delta = Math.min((now - lastTime) / 1000, 0.1);
                        
                        if (videoRef.current && !videoRef.current.ended && videoRef.current.readyState >= 2 && !videoRef.current.paused && time < TOTAL_DURATION) {
                            time = videoRef.current.currentTime;
                        } else {
                            time += delta;
                        }
                        
                        timeRef.current = time;

                        if (previewProgressBarRef.current) previewProgressBarRef.current.style.width = `${(time / TOTAL_DURATION) * 100}%`;
                        if (hudTimeRef.current) {
                            const minutes = Math.floor(time / 60);
                            const seconds = (time % 60).toFixed(2);
                            hudTimeRef.current.innerText = `${minutes}:${seconds.padStart(5, '0')}s`;
                        }
                        
                        if (videoRef.current) {
                            videoRef.current.style.transform = `scale(${getZoomLevel(time)})`;
                        }

                        const sub = subtitlesRef.current.find(s => time >= s.start && time <= s.end) || null;
                        if (sub?.id !== activeSubRef.current?.id) {
                            activeSubRef.current = sub;
                            setActiveSubtitle(sub);
                        }
                        
                        // Atualiza Símbolo Flutuante
                        const currentSymbol = getSymbolForTime(time);
                        setActiveSymbol(prev => prev !== currentSymbol ? currentSymbol : prev);

                        // Fim do vídeo
                        if (time >= TOTAL_DURATION) {
                            setIsPlaying(false);
                            resetTime();
                        }
                    }
                    lastTime = now;
                    frameId = requestAnimationFrame(loop);
                };

                frameId = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(frameId);
            }, [isPlaying, countdown]);

            const startRecordingMode = () => {
                setIsDownloadModalOpen(false);
                setIsRecordingMode(true);
                resetTime();
                setCountdown(5);
                
                if (videoRef.current) {
                     videoRef.current.play().then(() => {
                         videoRef.current.pause();
                         videoRef.current.currentTime = 0;
                     }).catch(() => {});
                }
            };

            useEffect(() => {
                if (countdown === null) return;
                if (countdown > 0) {
                    const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                    return () => clearTimeout(timer);
                } else if (countdown === 0) {
                    setCountdown(null);
                    setIsPlaying(true);
                    safePlayVideo();
                }
            }, [countdown]);

            const stopRecordingMode = () => {
                setIsRecordingMode(false);
                setIsPlaying(false);
                setCountdown(null);
                if (videoRef.current) videoRef.current.pause();
            };

            return (
                <div className="flex w-full h-screen bg-[#050505] text-white font-sans overflow-hidden">
                    <style>{`
                        /* COLOR GRADING PREMIUM (Golden Hour) */
                        .color-graded-video {
                            filter: contrast(1.15) brightness(1.05) saturate(1.6) sepia(0.4) hue-rotate(-10deg);
                            transform-origin: center center; 
                            will-change: transform;
                        }
                        
                        /* VINHETA RICA (Tons quentes de Golden Hour) */
                        .vignette-effect {
                            background: linear-gradient(90deg, rgba(40,15,0,0.95) 0%, rgba(40,15,0,0.5) 35%, rgba(0,0,0,0) 70%),
                                        radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(40,10,0,0.6) 100%);
                            pointer-events: none;
                        }

                        /* BRILHO ALARANJADO DO SOL */
                        .golden-flare {
                            background: radial-gradient(circle at 20% 20%, rgba(255,140,40,0.25) 0%, transparent 60%);
                            mix-blend-mode: screen;
                            pointer-events: none;
                        }

                        .custom-scrollbar::-webkit-scrollbar {
                            width: 6px;
                        }
                        .custom-scrollbar::-webkit-scrollbar-thumb {
                            background: rgba(255, 255, 255, 0.2);
                            border-radius: 4px;
                        }
                        
                        /* ANIMAÇÕES DAS LEGENDAS COM GLOW E SHIMMER */
                        @keyframes slideUpFadeBlur { 
                            0% { transform: translateY(30px) scale(0.95); opacity: 0; filter: blur(8px); } 
                            100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0px); } 
                        }
                        .word-reveal { 
                            display: inline-block; 
                            animation: slideUpFadeBlur 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
                            opacity: 0; 
                        }
                        
                        .text-glow-white { 
                            text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 25px rgba(255,255,255,0.4); 
                        }
                        .text-glow-gold { 
                            color: #D5CABD; 
                            text-shadow: 0 4px 20px rgba(0,0,0,0.9), 0 0 30px rgba(213,202,189,0.8); 
                        }

                        /* MOVIMENTO CONTÍNUO DOS TEXTOS (Flutuação) */
                        @keyframes continuousFloat {
                            0%, 100% { transform: translateY(0px); }
                            50% { transform: translateY(-8px); }
                        }
                        .floating-text-container {
                            animation: continuousFloat 6s ease-in-out infinite;
                        }
                        
                        /* SÍMBOLOS GIGANTES NO FUNDO */
                        @keyframes slowSpinFloat {
                            0% { transform: translate(-20px, 20px) rotate(-5deg) scale(0.9); opacity: 0; }
                            20% { opacity: 0.15; }
                            80% { opacity: 0.15; }
                            100% { transform: translate(30px, -30px) rotate(15deg) scale(1.1); opacity: 0; }
                        }
                        .animate-symbol-bg {
                            animation: slowSpinFloat 30s ease-in-out forwards;
                            filter: drop-shadow(0 0 30px rgba(213,202,189,0.3));
                        }
                    `}</style>

                    {isDownloadModalOpen && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/90 p-4">
                            <div className="bg-[#111] border border-white/10 rounded-3xl p-8 max-w-lg w-full shadow-2xl relative">
                                <h2 className="text-2xl font-bold mb-2 flex items-center gap-3 tracking-tight text-white">
                                    <Video className="text-brand-taupe" size={28} /> Preparar para Gravação
                                </h2>
                                <div className="space-y-4 mt-6">
                                    <div className="p-5 border border-white/10 bg-white/5 rounded-2xl">
                                        <h3 className="font-bold text-white mb-2">Grave com Tela Cheia</h3>
                                        <p className="text-sm text-neutral-400 mb-6 leading-relaxed">
                                            A aplicação irá esconder menus e iniciar contagem de 5s. Utilize o seu gravador de ecrã favorito no PC. O vídeo de 7 minutos renderizará em formato Widescreen 16:9.
                                        </p>
                                        <button onClick={startRecordingMode} className="w-full py-3 bg-brand-taupe hover:bg-[#7A6B5E] text-white rounded-xl font-bold transition-colors text-sm flex items-center justify-center gap-2">
                                            <Video size={16} /> LIMPAR TELA E INICIAR CONTAGEM
                                        </button>
                                    </div>
                                </div>
                                <button onClick={() => setIsDownloadModalOpen(false)} className="w-full mt-4 py-3 text-neutral-500 hover:text-white font-bold transition-colors text-sm">
                                    FECHAR
                                </button>
                            </div>
                        </div>
                    )}

                    {!isRecordingMode && (
                        <div className="w-80 h-full border-r border-white/10 bg-[#0d0d0d] p-6 flex flex-col gap-6 z-20 shrink-0 overflow-y-auto shadow-2xl">
                            <div className="space-y-1 pb-4 border-b border-white/5">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-brand-taupe rounded-full flex items-center justify-center font-bold text-sm">7M</div>
                                    <h1 className="text-lg font-bold tracking-tight">VÍDEO POESIA</h1>
                                </div>
                                <p className="text-[10px] text-neutral-500 font-medium uppercase tracking-[0.2em]">Cinematic Edit - {Math.floor(TOTAL_DURATION / 60)}:{TOTAL_DURATION % 60}m</p>
                            </div>

                            <div className="space-y-3">
                                <button 
                                    onClick={togglePlay}
                                    className={`w-full py-4 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 ${isPlaying ? 'bg-white text-black shadow-lg' : 'bg-brand-taupe text-white hover:bg-[#7A6B5E] shadow-lg shadow-[#8C7D70]/20'}`}
                                >
                                    {isPlaying ? <Pause size={18} fill="currentColor" /> : <Play size={18} fill="currentColor" />}
                                    {isPlaying ? 'PAUSAR PREVIEW' : 'REPRODUZIR PREVIEW'}
                                </button>
                                <button 
                                    onClick={resetTime}
                                    className="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-xs font-semibold flex items-center justify-center gap-2 transition-colors"
                                >
                                    <RefreshCw size={14} /> RESETAR TEMPO
                                </button>
                                <button 
                                    onClick={() => setIsTimingEditorOpen(true)}
                                    className="w-full py-3 rounded-xl bg-brand-sand/10 hover:bg-brand-sand/20 border border-brand-sand/30 text-brand-sand text-xs font-semibold flex items-center justify-center gap-2 transition-colors"
                                >
                                    <Clock size={14} /> EDITAR TIMING
                                </button>
                            </div>

                            <div className="mt-4 pt-4 border-t border-white/5 space-y-2">
                                <input type="file" accept="video/*" className="hidden" ref={fileInputRef} onChange={handleVideoUpload} />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className={`w-full py-3 px-4 rounded-xl border text-[10px] font-bold flex items-center justify-between transition-all tracking-wider ${localVideoUrl ? 'border-brand-sand/50 bg-brand-sand/10 text-brand-sand' : 'border-white/10 text-neutral-400 hover:bg-white/5'}`}
                                >
                                    {localVideoUrl ? 'VÍDEO CARREGADO ✓' : 'CARREGAR VÍDEO LOCAL'}
                                    <Upload size={16} />
                                </button>
                            </div>

                            <div className="mt-auto space-y-4 pt-4">
                                <button 
                                    onClick={() => setIsDownloadModalOpen(true)}
                                    className="w-full py-4 rounded-2xl font-black text-sm shadow-xl transition-all flex flex-col items-center justify-center gap-1 bg-brand-taupe text-white hover:scale-[1.02] shadow-[#8C7D70]/20"
                                >
                                    <div className="flex items-center gap-2">
                                        <Video size={18} />
                                        PREPARAR PARA GRAVAR
                                    </div>
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 h-full flex items-center justify-center relative p-0 sm:p-8 bg-[#050505]">
                        
                        {countdown !== null && countdown > 0 && (
                            <div className="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-[#050505]">
                                <h2 className="text-4xl font-light text-white mb-6 text-center leading-tight">
                                    Inicie a sua gravação<br/>
                                    <span className="text-brand-sand font-medium">O vídeo de 7m arranca em:</span>
                                </h2>
                                <div className="text-9xl font-black text-brand-light drop-shadow-[0_0_40px_rgba(213,202,189,0.4)] transition-transform duration-500 scale-110">
                                    {countdown}
                                </div>
                            </div>
                        )}
                        
                        {isRecordingMode && countdown === null && (
                            <button onClick={stopRecordingMode} className="absolute top-6 left-6 z-50 px-4 py-2 bg-red-600/30 hover:bg-red-600 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2 transition-all opacity-20 hover:opacity-100">
                                <Pause size={14} fill="currentColor" /> SAIR DA TELA LIMPA
                            </button>
                        )}

                        {!isRecordingMode && (
                            <div className="absolute top-6 right-6 flex items-center gap-4 z-50 bg-black/80 px-4 py-2 rounded-2xl border border-white/10 hidden sm:flex">
                                <div className="flex flex-col items-end">
                                <span className="text-[9px] font-bold text-neutral-400 uppercase tracking-[0.2em]">Timecode (7 Min)</span>
                                <span ref={hudTimeRef} className="text-xl font-mono text-white tracking-widest leading-none mt-1">0:00.00s</span>
                                </div>
                            </div>
                        )}

                        {/* --- CANVAS WIDESCREEN (16:9) --- */}
                        <div 
                            className="relative overflow-hidden transition-all duration-500 flex items-center justify-center"
                            style={{ 
                                aspectRatio: '16/9', 
                                width: isRecordingMode ? '100vw' : '100%',
                                maxWidth: isRecordingMode ? 'none' : '1200px',
                                maxHeight: isRecordingMode ? '100vh' : '85vh',
                                backgroundColor: '#1a1a1a',
                                borderRadius: isRecordingMode ? '0px' : '16px',
                                border: isRecordingMode ? 'none' : '1px solid rgba(255,255,255,0.1)',
                                boxShadow: isRecordingMode ? 'none' : '0 30px 60px -20px rgba(0, 0, 0, 0.9)'
                            }}
                        >
                            
                            {/* CAMADA DE VÍDEO */}
                            <div className={`absolute inset-0 w-full h-full bg-[#111] z-0 transition-opacity duration-1000 opacity-100`}>
                                <video
                                    ref={videoRef}
                                    src={localVideoUrl}
                                    crossOrigin="anonymous"
                                    className="absolute inset-0 w-full h-full object-cover color-graded-video"
                                    playsInline
                                    preload="auto"
                                    loop
                                />
                                <div className="absolute inset-0 vignette-effect"></div>
                                <div className="absolute inset-0 golden-flare"></div>
                                
                                {/* Símbolos Flutuantes (Atrás do Texto) */}
                                <div className="absolute inset-0 pointer-events-none flex items-center justify-start pl-[5%] overflow-hidden z-[1]">
                                    {activeSymbol === 'sun' && <SymbolSun key="sun" className="w-[500px] h-[500px] text-brand-sand animate-symbol-bg" />}
                                    {activeSymbol === 'infinity' && <SymbolInfinity key="infinity" className="w-[450px] h-[450px] text-brand-taupe animate-symbol-bg" />}
                                    {activeSymbol === 'time' && <SymbolTime key="time" className="w-[450px] h-[450px] text-brand-sand animate-symbol-bg" />}
                                    {activeSymbol === 'diamond' && <SymbolDiamond key="diamond" className="w-[500px] h-[500px] text-brand-taupe animate-symbol-bg" />}
                                    {activeSymbol === 'sparkles' && <SymbolSparkles key="sparkles" className="w-[450px] h-[450px] text-brand-sand animate-symbol-bg" />}
                                </div>
                            </div>

                            {/* CAMADA DAS LEGENDAS COM FLUATUAÇÃO */}
                            <div className={`absolute inset-y-0 left-0 w-2/3 md:w-[60%] p-10 md:p-16 z-20 pointer-events-none flex flex-col justify-center transition-opacity duration-500 opacity-100`}>
                                <div className="floating-text-container">
                                    {activeSubtitle && (
                                        <div className="relative">
                                            <div className="flex flex-wrap items-end gap-x-3 gap-y-1">
                                                {activeSubtitle.text.split(' ').map((word, idx) => {
                                                    const cleanWord = word.replace(/[\.,!\?]/g, '').toLowerCase();
                                                    const isKeyword = keywords.map(k => k.toLowerCase()).includes(cleanWord);
                                                    
                                                    const textColorClass = isKeyword ? 'text-glow-gold font-bold' : 'text-[#F4F4F4] text-glow-white font-medium';
                                                    
                                                    return (
                                                        <span key={`${activeSubtitle.id}-${idx}`} className="word-reveal" style={{ animationDelay: `${idx * 0.05}s` }}>
                                                            <span className={`text-[30px] sm:text-[36px] md:text-[42px] lg:text-[48px] leading-[1.2] tracking-tight ${textColorClass}`}>
                                                                {word}
                                                            </span>
                                                        </span>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Barra de Progresso do Editor */}
                            <div className="absolute bottom-0 left-0 w-full h-1 bg-black/40 z-30">
                                <div ref={previewProgressBarRef} className="h-full bg-brand-taupe shadow-[0_0_15px_rgba(213,202,189,0.9)] transition-all duration-300" style={{ width: '0%' }}></div>
                            </div>

                        </div>
                        
                        {/* MODAL DE EDIÇÃO DE TIMING */}
                        {isTimingEditorOpen && (
                            <div className="absolute inset-4 z-[150] bg-[#0a0a0a]/95 backdrop-blur-md rounded-2xl border border-white/10 p-6 flex flex-col shadow-2xl flex-1 max-w-4xl mx-auto hidden sm:flex">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h2 className="text-xl font-bold text-brand-sand flex items-center gap-2">
                                            <Clock size={20} /> Ajuste de Sincronia das Legendas
                                        </h2>
                                        <p className="text-xs text-neutral-400 mt-1">Ajuste o tempo exato (em segundos) em que cada linha inicia e desaparece.</p>
                                    </div>
                                    <button onClick={() => setIsTimingEditorOpen(false)} className="px-4 py-2 bg-white/10 hover:bg-white/20 text-white rounded-lg text-xs font-bold transition-colors">FECHAR EDITOR</button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                                    {subtitles.map((sub) => (
                                        <div key={sub.id} className="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/5 hover:border-brand-sand/30 transition-colors">
                                            <span className="w-6 text-neutral-500 font-mono text-xs text-center">{sub.id}</span>
                                            <div className="flex-1 text-sm text-neutral-200 truncate pr-4 font-medium" title={sub.text}>{sub.text}</div>
                                            <div className="flex gap-3 items-center shrink-0">
                                                <div className="flex items-center gap-2">
                                                    <label className="text-[10px] text-neutral-500 font-bold uppercase tracking-wider">Início</label>
                                                    <input
                                                        type="number"
                                                        step="0.1"
                                                        value={Number(sub.start).toString()}
                                                        onChange={(e) => updateSubtitleTime(sub.id, 'start', e.target.value)}
                                                        className="w-[72px] bg-black/50 border border-white/10 rounded-md px-2 py-1.5 text-brand-sand text-sm font-mono text-center focus:outline-none focus:border-brand-sand"
                                                    />
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <label className="text-[10px] text-neutral-500 font-bold uppercase tracking-wider">Fim</label>
                                                    <input
                                                        type="number"
                                                        step="0.1"
                                                        value={Number(sub.end).toString()}
                                                        onChange={(e) => updateSubtitleTime(sub.id, 'end', e.target.value)}
                                                        className="w-[72px] bg-black/50 border border-white/10 rounded-md px-2 py-1.5 text-brand-sand text-sm font-mono text-center focus:outline-none focus:border-brand-sand"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
