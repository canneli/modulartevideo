    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@600;800&display=swap');

        :root {
            --blood-red: #cc0022;
            --dark-blood: #55000e;
            --muted-chrome: #9a9192; /* Cinza metálico escuro, não branco */
            --dark-bg: #030001;
            --bpm-ms: 521.73ms; 
            --half-bpm: 260.86ms;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--dark-bg); color: var(--muted-chrome);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0004 0%, #000 100%);
        }

        /* --- UI Controls --- */
        #controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 200; transition: opacity 0.4s;
            backdrop-filter: blur(10px);
        }
        .control-box {
            padding: 40px; border: 1px solid var(--dark-blood); text-align: center;
            background: rgba(20, 0, 5, 0.8);
            box-shadow: 0 0 50px rgba(204, 0, 34, 0.1);
            position: relative;
        }
        .control-box::before { content: '⌖'; position: absolute; top: 10px; left: 15px; color: var(--blood-red); opacity: 0.5; }
        .control-box::after { content: '⌖'; position: absolute; bottom: 10px; right: 15px; color: var(--blood-red); opacity: 0.5; }

        .control-box h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; text-transform: uppercase; margin: 0 0 5px 0; color: var(--muted-chrome); letter-spacing: 2px; }
        .btn-play { margin-top: 25px; background: transparent; color: var(--blood-red); border: 1px solid var(--blood-red); padding: 15px 40px; font-family: 'Syne'; font-weight: 800; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 3px; }
        .btn-play:hover { background: var(--blood-red); color: #000; box-shadow: 0 0 20px var(--blood-red); }
        .file-input-wrapper { display: flex; flex-direction: column; align-items: center; margin: 15px 0; }
        .custom-file-upload { display: inline-block; padding: 10px; border-bottom: 1px dashed var(--dark-blood); margin-bottom: 5px; cursor: pointer; font-size: 11px; letter-spacing: 1px; color: #888; transition: 0.3s; }
        .custom-file-upload:hover { color: var(--blood-red); border-color: var(--blood-red); }
        input[type="file"] { display: none; }

        /* --- STAGE & BACKGROUND --- */
        #stage { position: relative; width: 100%; height: 100%; overflow: hidden; perspective: 1000px; }

        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0;
            filter: grayscale(1) contrast(1.5) brightness(0.25); /* Muito escuro */
            mix-blend-mode: multiply;
            transform: scale(1.1) translateZ(-100px);
            transition: opacity 0.5s ease;
        }
        .bg-image.active { opacity: 1; animation: dark-breathe 8s ease-in-out infinite alternate; }

        @keyframes dark-breathe {
            0% { transform: scale(1.1) translateZ(-100px) rotate(0deg); }
            100% { transform: scale(1.15) translateZ(-50px) rotate(1deg); }
        }

        /* --- 3D CYBER GRID --- */
        .cyber-grid {
            position: absolute; bottom: -50%; left: -50%; width: 200%; height: 100%;
            background-image: 
                linear-gradient(rgba(204, 0, 34, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204, 0, 34, 0.15) 1px, transparent 1px);
            background-size: 60px 60px;
            transform-origin: center top;
            transform: rotateX(75deg) translateZ(-200px);
            animation: grid-move var(--bpm-ms) linear infinite;
            z-index: 5; opacity: 0.6; pointer-events: none;
        }
        @keyframes grid-move { 100% { background-position: 0 60px; } }

        /* --- OVERLAYS ESCUROS --- */
        .blood-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #050002 90%);
            z-index: 10; pointer-events: none;
        }

        .dark-grain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15; mix-blend-mode: overlay; z-index: 12; pointer-events: none;
        }

        /* --- ELEMENTOS FLUTUANTES NO FUNDO --- */
        #dynamic-elements {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 8; pointer-events: none; overflow: hidden;
        }
        .bg-symbol {
            position: absolute; color: var(--dark-blood); font-family: 'Space Grotesk';
            opacity: 0; filter: blur(2px); font-size: 20px; font-weight: bold;
        }
        @keyframes float-symbol {
            0% { transform: translateY(50px) scale(0.8) rotate(0deg); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-100px) scale(1.2) rotate(45deg); opacity: 0; }
        }

        /* --- MARQUEE DARK --- */
        .fast-marquee {
            position: absolute; width: 200%; font-family: 'Syne'; font-size: 8vw; 
            font-weight: 800; color: transparent; -webkit-text-stroke: 1px rgba(204, 0, 34, 0.15);
            white-space: nowrap; z-index: 9; opacity: 0.4; pointer-events: none;
        }
        .fast-marquee.top { top: 15%; animation: scroll-fast 12s linear infinite; }
        .fast-marquee.bottom { top: 75%; animation: scroll-fast-reverse 15s linear infinite; }
        @keyframes scroll-fast { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scroll-fast-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        /* --- DARK STROBE (Não cega, escurece) --- */
        .strobe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--blood-red); z-index: 99; opacity: 0; pointer-events: none;
            mix-blend-mode: color-burn; /* Escurece a tela e satura de vermelho */
        }
        .strobe.active { animation: dark-flash 0.2s ease-out; }
        @keyframes dark-flash { 0% { opacity: 0.9; } 100% { opacity: 0; } }

        /* --- TIPOGRAFIA CINÉTICA E "VIRADINHAS" --- */
        #lyrics-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; pointer-events: none; display: flex; padding: 5%; box-sizing: border-box;
            align-items: center; justify-content: center;
            transform-style: preserve-3d;
        }

        .lyric-line {
            font-family: 'Syne', sans-serif; font-size: 8vw; font-weight: 800; 
            text-transform: uppercase; line-height: 0.9; color: var(--muted-chrome); 
            width: 100%; text-align: center; opacity: 0;
            text-shadow: 5px 5px 0px rgba(10, 0, 0, 0.8), -2px -2px 15px rgba(204, 0, 34, 0.2);
            will-change: transform, opacity;
        }

        /* O movimento suave constante que substituiu o tremor */
        .is-active-line {
            animation: smooth-drift-rotate 6s ease-in-out infinite alternate !important;
        }
        @keyframes smooth-drift-rotate { 
            0% { transform: translateZ(0px) rotateX(2deg) rotateY(-2deg); filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); } 
            100% { transform: translateZ(30px) rotateX(-2deg) rotateY(2deg); filter: drop-shadow(0 0 20px rgba(204,0,34,0.3)); } 
        }

        /* ENTRADAS: Rápidas e com "viradinhas" 3D */
        .kin-flip-in .lyric-line { animation: kin-flip-anim 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes kin-flip-anim { 0% { transform: rotateX(-80deg) translateZ(-200px); opacity: 0; } 100% { transform: rotateX(0deg) translateZ(0); opacity: 1; } }

        .kin-tilt-slide .lyric-line { animation: kin-tilt-anim 0.2s ease-out forwards; }
        @keyframes kin-tilt-anim { 0% { transform: translateX(50px) rotate(-10deg); opacity: 0; filter: blur(5px); } 100% { transform: translateX(0) rotate(0deg); opacity: 1; filter: blur(0px); } }

        .kin-zoom-slam .lyric-line { animation: kin-zoom-anim 0.15s ease-out forwards; }
        @keyframes kin-zoom-anim { 0% { transform: scale(2) rotate(5deg); opacity: 0; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }

        /* Estilos de Destaque das Palavras (Dark e Vermelho) */
        .highlight-solid {
            color: #000; background: var(--blood-red); padding: 0 15px;
            display: inline-block; text-shadow: none; box-shadow: 4px 4px 0px #000;
        }
        .highlight-outline {
            color: transparent; -webkit-text-stroke: 2px var(--blood-red);
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.9));
        }

        /* --- HUD Sutil Escuro --- */
        .rec-indicator {
            position: absolute; top: 30px; left: 40px; color: var(--dark-blood);
            font-family: 'Space Grotesk'; font-weight: bold; font-size: 18px; z-index: 20;
            animation: dark-pulse-rec 1s steps(2, start) infinite;
        }
        .rec-indicator::before { content: '●'; margin-right: 8px; }
        @keyframes dark-pulse-rec { 0% { opacity: 0.8; } 100% { opacity: 0.2; } }

    </style>

    let subtitles = [];
    let images = [
        "https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?w=1600&q=80",
        "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=1600&q=80",
        "https://images.unsplash.com/photo-1571172828691-537446545183?w=1600&q=80",
        "https://images.unsplash.com/photo-1558317751-bc3ed6f85f72?w=1600&q=80"
    ];
    let audioSrc = null;
    let isPlaying = false;
    let currentSrtIndex = -1;
    let currentImageIndex = 0;
    let startTime = 0;
    
    // Palavras Chave para estilização dark
    const outlineKeywords = ['glory hole', 'divine', 'body', 'throat'];
    const solidKeywords = ['scream', 'dark', 'hungry', 'lick', 'choke', 'bite', 'alive', 'yeah', 'hope'];
    
    // Novas animações focadas nas "viradinhas"
    const kineticAnimations = ['kin-flip-in', 'kin-tilt-slide', 'kin-zoom-slam'];

    // Símbolos pra flutuar
    const bgSymbolsList = ['⌖', '✦', '[SYS]', '///', '✖'];

    function timeToMs(timeString) {
        const parts = timeString.split(',');
        const timeParts = parts[0].split(':');
        return parseInt(timeParts[0]) * 3600000 + parseInt(timeParts[1]) * 60000 + parseInt(timeParts[2]) * 1000 + parseInt(parts[1]);
    }

    function parseSRT(data) {
        const blocks = data.split(/\n\s*\n/);
        const parsed = [];
        blocks.forEach(block => {
            const lines = block.split('\n');
            if (lines.length >= 3) {
                const times = lines[1].split(' --> ');
                if (times.length === 2) {
                    parsed.push({
                        // CORREÇÃO DE TIMING: 
                        // Inicia um pouquinho antes na lógica interna para compensar o frame da animação
                        start: Math.max(0, timeToMs(times[0]) - 50),
                        // Mantém na tela um pouco mais se não for muito rápido
                        end: timeToMs(times[1]) + 200, 
                        text: lines.slice(2).join('<br>')
                    });
                }
            }
        });
        return parsed;
    }

    function formatText(text) {
        let formatted = text;
        outlineKeywords.forEach(kw => { const regex = new RegExp(`\\b${kw}\\b`, 'gi'); formatted = formatted.replace(regex, `<span class="highlight-outline">$&</span>`); });
        solidKeywords.forEach(kw => { const regex = new RegExp(`\\b${kw}\\b`, 'gi'); formatted = formatted.replace(regex, `<span class="highlight-solid">$&</span>`); });
        return formatted;
    }

    function spawnFloatingSymbol() {
        if(!isPlaying) return;
        const container = document.getElementById('dynamic-elements');
        const el = document.createElement('div');
        el.className = 'bg-symbol';
        el.innerText = bgSymbolsList[Math.floor(Math.random() * bgSymbolsList.length)];
        el.style.left = `${Math.random() * 90}%`;
        el.style.top = `${Math.random() * 90}%`;
        el.style.animation = `float-symbol ${Math.random() * 2 + 3}s linear forwards`;
        container.appendChild(el);
        setTimeout(() => { if(container.contains(el)) container.removeChild(el); }, 5000);
    }

    document.getElementById('imageUpload').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            images = Array.from(e.target.files).map(file => URL.createObjectURL(file));
            document.getElementById('img-count').innerText = `${images.length} FOTOS CARREGADAS`;
            initImageLayers();
        }
    });

    document.getElementById('audioUpload').addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            audioSrc = URL.createObjectURL(file);
            document.getElementById('audio-player').src = audioSrc;
            document.getElementById('audio-status').innerText = `MÚSICA: ${file.name}`;
            document.getElementById('audio-status').style.color = 'var(--blood-red)';
        }
    });

    function initImageLayers() {
        const container = document.getElementById('image-container');
        container.innerHTML = '';
        images.forEach((src, idx) => {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'bg-image';
            if (idx === 0) imgDiv.classList.add('active');
            imgDiv.style.backgroundImage = `url(${src})`;
            imgDiv.id = `img-${idx}`;
            container.appendChild(imgDiv);
        });
    }

    // DISPARO ESCURO (Bate estaca com Color Burn)
    function triggerDarkStrobe() {
        const strobe = document.getElementById('strobe-layer');
        strobe.classList.remove('active'); void strobe.offsetWidth; strobe.classList.add('active');
        changeImage();
        
        // Spawn múltiplos elementos na batida
        spawnFloatingSymbol();
        spawnFloatingSymbol();
    }

    function changeImage() {
        if(images.length <= 1) return;
        const oldImg = document.getElementById(`img-${currentImageIndex}`);
        if(oldImg) oldImg.classList.remove('active');
        
        let nextIndex; do { nextIndex = Math.floor(Math.random() * images.length); } while (nextIndex === currentImageIndex);
        currentImageIndex = nextIndex;
        
        const newImg = document.getElementById(`img-${currentImageIndex}`);
        if(newImg) newImg.classList.add('active');
    }

    function startVideo() {
        document.getElementById('controls-overlay').style.opacity = 0;
        setTimeout(() => document.getElementById('controls-overlay').style.display = 'none', 400);

        subtitles = parseSRT(srtData);
        initImageLayers();
        isPlaying = true;
        
        if (audioSrc) {
            const player = document.getElementById('audio-player');
            player.play();
            requestAnimationFrame(updateLoopAudio);
        } else {
            startTime = Date.now();
            requestAnimationFrame(updateLoopSimulated);
        }
        
        // Elementos flutuantes contínuos
        setInterval(spawnFloatingSymbol, 800);
        // Troca de fundo caso falte batida
        setInterval(changeImage, 4000);
    }

    function processTime(currentTimeMs) {
        const sub = subtitles.find(s => currentTimeMs >= s.start && currentTimeMs <= s.end);
        const textElement = document.getElementById('current-lyric');
        const containerElement = document.getElementById('lyrics-container');

        if (sub) {
            let index = subtitles.indexOf(sub);
            if (index !== currentSrtIndex) {
                currentSrtIndex = index;

                // É UM BEAT DROP FORTE (ponto no SRT)
                if (sub.text.trim() === '.') {
                    triggerDarkStrobe();
                    textElement.classList.remove('is-active-line');
                    textElement.style.opacity = 0;
                } else {
                    // Texto normal com as novas viradinhas elegantes
                    const randomAnimClass = kineticAnimations[Math.floor(Math.random() * kineticAnimations.length)];
                    containerElement.className = randomAnimClass;

                    textElement.innerHTML = formatText(sub.text);
                    textElement.style.opacity = 1;
                    
                    textElement.style.animation = 'none'; void textElement.offsetWidth; textElement.style.animation = null;
                    textElement.classList.add('is-active-line');
                }
            }
        } else {
            textElement.style.opacity = 0;
            textElement.classList.remove('is-active-line');
            currentSrtIndex = -1;
        }
    }

    function updateLoopAudio() { if (!isPlaying) return; processTime(document.getElementById('audio-player').currentTime * 1000); requestAnimationFrame(updateLoopAudio); }
    function updateLoopSimulated() { if (!isPlaying) return; processTime(Date.now() - startTime); requestAnimationFrame(updateLoopSimulated); }

</script>
